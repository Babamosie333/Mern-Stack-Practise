<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Properties Reference</title>
  <style>
    html,body{height:100%;margin:0}
    body{display:flex;overflow:hidden;background:#07090f}
    #sidebar-frame{width:320px;flex-shrink:0;height:100vh;border:0}
    #content-frame{flex:1;height:100vh;border:0}
    @media (max-width:900px){
      body{flex-direction:column}
      #sidebar-frame{width:100%;height:38vh}
      #content-frame{width:100%;height:62vh}
    }
  </style>
</head>
<body>
  <iframe id="sidebar-frame" src="sidebar.html" name="sidebar" title="Sidebar"></iframe>
  <iframe id="content-frame" src="content.html?prop=width" name="content" title="Content"></iframe>
</body>
</html>
