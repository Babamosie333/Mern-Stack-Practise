<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --accent:#6c8bff; --accent2:#a259ff; --accent3:#ff6584;
      --green:#00e5a0; --cyan:#38d9f5; --yellow:#ffd580; --orange:#ff8c69;
      --bg:#07090f; --bg2:#0e1120; --bg3:#131729;
      --text:#dde2f5; --muted:#5a6385; --border:#1a1f36;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{
      background:var(--bg);color:var(--text);
      font-family:'Outfit',sans-serif;font-size:14px;
      line-height:1.7;min-height:100vh;
    }

    /* ──────────── WELCOME ──────────── */
    #welcome{
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      min-height:100vh;padding:48px;
      background:radial-gradient(ellipse at 50% 30%,rgba(108,139,255,.07) 0%,transparent 65%);
    }
    .w-logo{
      font-family:'JetBrains Mono',monospace;font-size:80px;font-weight:700;
      background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      line-height:1;margin-bottom:26px;
      filter:drop-shadow(0 0 40px rgba(108,139,255,.25));
    }
    .w-title{font-size:30px;font-weight:700;color:var(--text);margin-bottom:10px;letter-spacing:-.5px;}
    .w-sub{color:var(--muted);font-size:14px;text-align:center;max-width:420px;margin-bottom:34px;line-height:1.6;}
    .w-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:520px;width:100%;}
    .w-stat{
      background:var(--bg2);border:1px solid var(--border);
      border-radius:12px;padding:16px;text-align:center;
    }
    .w-stat .num{
      font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;
      display:block;background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    }
    .w-stat .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px;}
    .w-hint{
      margin-top:28px;padding:12px 22px;
      background:rgba(108,139,255,.07);border:1px solid rgba(108,139,255,.2);
      border-radius:8px;font-family:'JetBrains Mono',monospace;
      font-size:12px;color:var(--accent);
    }

    /* ──────────── PROPERTY PAGE ──────────── */
    #prop-page{display:none;}

    /* Hero */
    .prop-hero{
      background:linear-gradient(135deg,#0c0f1a 0%,#10152a 100%);
      border-bottom:1px solid var(--border);
      padding:32px 42px 28px;position:relative;overflow:hidden;
    }
    .prop-hero::before{
      content:'';position:absolute;top:-80px;right:-80px;
      width:300px;height:300px;
      background:radial-gradient(circle,rgba(108,139,255,.07) 0%,transparent 70%);
      pointer-events:none;
    }
    .prop-hero::after{
      content:'';position:absolute;bottom:-50px;left:30%;
      width:200px;height:200px;
      background:radial-gradient(circle,rgba(162,89,255,.05) 0%,transparent 70%);
      pointer-events:none;
    }
    .hero-breadcrumb{
      font-family:'JetBrains Mono',monospace;font-size:11px;
      color:var(--muted);margin-bottom:14px;letter-spacing:.5px;
    }
    .hero-breadcrumb span{color:var(--accent);}
    .hero-prop-name{
      font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:700;
      color:var(--text);line-height:1;margin-bottom:12px;
    }
    .hero-prop-name .pname{color:var(--accent);}
    .hero-prop-name .colon{color:var(--muted);font-size:30px;}
    .hero-desc{font-size:15px;color:var(--muted);max-width:700px;line-height:1.65;margin-bottom:18px;}
    .hero-badges{display:flex;gap:8px;flex-wrap:wrap;}
    .hbadge{
      padding:4px 12px;border-radius:20px;
      font-size:10px;font-family:'JetBrains Mono',monospace;
      font-weight:700;letter-spacing:.8px;text-transform:uppercase;
    }
    .hb-cat{background:rgba(108,139,255,.12);color:var(--accent);border:1px solid rgba(108,139,255,.25);}
    .hb-ver{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.22);}
    .hb-new{background:rgba(56,217,245,.1);color:var(--cyan);border:1px solid rgba(56,217,245,.22);}
    .hb-dep{background:rgba(255,101,132,.1);color:var(--accent3);border:1px solid rgba(255,101,132,.22);}
    .hb-exp{background:rgba(255,141,105,.1);color:var(--orange);border:1px solid rgba(255,141,105,.22);}
    .hb-inh{background:rgba(162,89,255,.1);color:var(--accent2);border:1px solid rgba(162,89,255,.22);}

    /* Content */
    .prop-content{padding:32px 42px 70px;}

    /* Section */
    .section{margin-bottom:36px;}
    .section-title{
      font-size:10px;font-weight:700;
      font-family:'JetBrains Mono',monospace;
      color:var(--muted);letter-spacing:2.5px;
      text-transform:uppercase;margin-bottom:14px;
      display:flex;align-items:center;gap:10px;
    }
    .section-title::after{content:'';flex:1;height:1px;background:var(--border);}
    .section p{color:#9aa3c4;line-height:1.8;margin-bottom:10px;}
    .section p:last-child{margin-bottom:0;}

    /* Code block */
    .code-block{
      background:#060810;border:1px solid var(--border);
      border-radius:10px;overflow:hidden;margin:8px 0;
    }
    .code-header{
      background:var(--bg2);padding:8px 16px;
      display:flex;justify-content:space-between;align-items:center;
      border-bottom:1px solid var(--border);
    }
    .code-lang{
      font-family:'JetBrains Mono',monospace;
      font-size:10px;color:var(--muted);
      text-transform:uppercase;letter-spacing:1.2px;
    }
    .code-copy{
      font-size:10px;color:var(--muted);cursor:pointer;
      padding:2px 8px;border:1px solid var(--border);
      border-radius:4px;background:transparent;
      font-family:'JetBrains Mono',monospace;transition:all .15s;
    }
    .code-copy:hover{color:var(--accent);border-color:var(--accent);}
    pre{
      padding:16px 20px;overflow-x:auto;
      font-family:'JetBrains Mono',monospace;
      font-size:12.5px;line-height:1.75;color:#c8d0f0;
    }
    pre::-webkit-scrollbar{height:4px;}
    pre::-webkit-scrollbar-track{background:transparent;}
    pre::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

    /* Syntax colors */
    .cp{color:#6c8bff;}   /* property */
    .cv{color:#ff8c69;}   /* value */
    .cs{color:#56d364;}   /* selector */
    .cc{color:#3a4060;}   /* comment */
    .ck{color:#a259ff;}   /* keyword / at-rule */
    .cn{color:#38d9f5;}   /* number */
    .cq{color:#ffd580;}   /* string/quotes */

    /* Values table */
    .val-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px;}
    .val-table th{
      text-align:left;padding:8px 12px;
      font-family:'JetBrains Mono',monospace;
      font-size:10px;color:var(--muted);
      letter-spacing:1px;text-transform:uppercase;
      border-bottom:1px solid var(--border);background:var(--bg2);
    }
    .val-table td{
      padding:9px 12px;border-bottom:1px solid rgba(26,31,54,.7);
      vertical-align:top;
    }
    .val-table tr:last-child td{border-bottom:none;}
    .val-table tr:hover td{background:rgba(108,139,255,.03);}
    .val-name{
      font-family:'JetBrains Mono',monospace;
      color:var(--cyan);font-size:12px;font-weight:600;white-space:nowrap;
    }
    .val-default{
      font-family:'JetBrains Mono',monospace;
      font-size:10px;color:var(--yellow);
      padding:1px 6px;background:rgba(255,213,128,.07);
      border-radius:4px;border:1px solid rgba(255,213,128,.15);
    }
    .val-desc{color:var(--muted);font-size:13px;}

    /* Info grid */
    .info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
    .info-card{
      background:var(--bg2);border:1px solid var(--border);
      border-radius:10px;padding:14px;
    }
    .ic-label{
      font-size:9px;font-family:'JetBrains Mono',monospace;
      color:var(--muted);text-transform:uppercase;
      letter-spacing:1.5px;margin-bottom:6px;
    }
    .ic-val{font-size:13px;font-weight:600;color:var(--text);}
    .ic-val.yes{color:var(--green);}
    .ic-val.no{color:var(--accent3);}

    /* Browser support bar */
    .browser-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px;}
    .browser-pill{
      display:flex;align-items:center;gap:5px;
      padding:4px 10px;border-radius:20px;
      font-size:11px;font-family:'JetBrains Mono',monospace;
    }
    .bp-yes{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.2);}
    .bp-partial{background:rgba(255,213,128,.08);color:var(--yellow);border:1px solid rgba(255,213,128,.18);}
    .bp-no{background:rgba(255,101,132,.08);color:var(--accent3);border:1px solid rgba(255,101,132,.18);}

    /* Note */
    .note{
      padding:12px 16px;border-radius:8px;
      border-left:3px solid;margin:10px 0;
      font-size:13px;line-height:1.6;
    }
    .note-info{background:rgba(108,139,255,.07);border-color:var(--accent);color:#9aabff;}
    .note-warn{background:rgba(255,101,132,.07);border-color:var(--accent3);color:#ff9aaa;}
    .note-tip {background:rgba(0,229,160,.07);border-color:var(--green);color:#6effd8;}
    .note strong{font-weight:700;}
    code{
      font-family:'JetBrains Mono',monospace;font-size:11.5px;
      color:var(--accent);background:rgba(108,139,255,.1);
      padding:1px 5px;border-radius:4px;
    }

    /* Live demo */
    .live-demo{
      border:1px solid var(--border);border-radius:10px;overflow:hidden;
    }
    .demo-header{
      background:var(--bg2);padding:8px 16px;
      display:flex;align-items:center;gap:6px;
      border-bottom:1px solid var(--border);
    }
    .demo-dot{width:10px;height:10px;border-radius:50%;}
    .demo-header span{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--muted);margin-left:4px;}
    .demo-body{padding:20px;background:#0a0d1a;}
  </style>
</head>
<body>

<!-- WELCOME -->
<div id="welcome">
  <div class="w-logo">{ }</div>
  <div class="w-title">CSS Properties Reference</div>
  <div class="w-sub">A complete guide to every CSS property — select one from the sidebar to explore its syntax, values, browser support, and examples.</div>
  <div class="w-stats">
    <div class="w-stat"><span class="num">200+</span><span class="lbl">Properties</span></div>
    <div class="w-stat"><span class="num">15</span><span class="lbl">Categories</span></div>
    <div class="w-stat"><span class="num">CSS3</span><span class="lbl">Standard</span></div>
    <div class="w-stat"><span class="num">2025</span><span class="lbl">Up to Date</span></div>
  </div>
  <div class="w-hint">← Click any property in the sidebar to begin</div>
</div>

<!-- PROP PAGE -->
<div id="prop-page"></div>

<script>
const DB = {
  "width":{
    desc:"Sets the width of an element's content area. By default it applies to the content box only. With <code>box-sizing: border-box</code> it includes padding and border. Accepts length values, percentages, keyword values, or intrinsic sizing keywords.",
    category:"Box Model",version:"CSS1",inherited:false,animatable:true,
    syntax:`<span class="cs">.box</span> {\n  <span class="cp">width</span>: <span class="cv">300px</span>;\n  <span class="cp">width</span>: <span class="cv">50%</span>;\n  <span class="cp">width</span>: <span class="cv">auto</span>;\n  <span class="cp">width</span>: <span class="cv">max-content</span>;\n  <span class="cp">width</span>: <span class="cv">min-content</span>;\n  <span class="cp">width</span>: <span class="cv">fit-content</span>;\n}`,
    example:`<span class="cs">.container</span> {\n  <span class="cp">width</span>: <span class="cv">800px</span>;\n  <span class="cp">max-width</span>: <span class="cv">100%</span>;   <span class="cc">/* Responsive: never overflow */</span>\n}\n<span class="cs">.fluid</span> {\n  <span class="cp">width</span>: <span class="cv">50%</span>;      <span class="cc">/* Half of parent */</span>\n}\n<span class="cs">.intrinsic</span> {\n  <span class="cp">width</span>: <span class="cv">fit-content</span>;  <span class="cc">/* Shrinks to content */</span>\n}`,
    values:[
      {v:"auto",d:"Browser calculates width (default for block = full parent width)"},
      {v:"<length>",d:"Explicit size: px, em, rem, vw, ch, etc."},
      {v:"<percentage>",d:"Percentage of the containing block's width"},
      {v:"min-content",d:"Width of the smallest content possible without overflow"},
      {v:"max-content",d:"Width required to fit all content on one line"},

      {v:"inherit",d:"Inherits width from parent element"},

    browser:{chrome:"1",firefox:"1",safari:"1",edge:"12",ie:"4"},
    notes:`<p>Always combine <code>width: 100%</code> with <code>max-width</code> for responsive layouts. Use <code>box-sizing: border-box</code> globally to make width calculations more intuitive.</p>
<div class="note note-tip"><strong>Tip:</strong> For fluid layouts prefer percentage or viewport units over fixed pixels. CSS Grid and Flexbox usually handle sizing better than manual widths.</div>`
  },
  "height":{
    desc:"Sets the height of an element. Unlike width, percentage heights require a definite height on the parent element to work. In modern CSS, use <code>min-height: 100vh</code> or <code>height: 100dvh</code> (dynamic viewport height) for full-page sections.",
    category:"Box Model",version:"CSS1",inherited:false,animatable:true,
    syntax:`<span class="cs">.box</span> {\n  <span class="cp">height</span>: <span class="cv">200px</span>;\n  <span class="cp">height</span>: <span class="cv">50vh</span>;\n  <span class="cp">height</span>: <span class="cv">auto</span>;\n  <span class="cp">height</span>: <span class="cv">100dvh</span>; <span class="cc">/* Modern: dynamic viewport */</span>\n}`,
    example:`<span class="cs">.full-page</span> {\n  <span class="cp">height</span>: <span class="cv">100vh</span>;\n  <span class="cp">min-height</span>: <span class="cv">100dvh</span>; <span class="cc">/* Better mobile support */</span>\n}\n<span class="cs">.card</span> {\n  <span class="cp">height</span>: <span class="cv">auto</span>; <span class="cc">/* Grows with content */</span>\n  <span class="cp">min-height</span>: <span class="cv">200px</span>;\n}`,
    values:[
      {v:"auto",d:"Element height is determined by its content (default)"},
      {v:"<length>",d:"Fixed height in px, em, rem, vh, etc."},
      {v:"<percentage>",d:"Percentage of parent's height (parent must have defined height)"},
      {v:"min-content / max-content / fit-content",d:"Intrinsic sizing keywords"},
    ],
    browser:{chrome:"1",firefox:"1",safari:"1",edge:"12",ie:"4"},
    notes:`<p>Setting <code>height: 100%</code> on a child requires the parent to have a defined height. A common pattern is <code>html, body { height: 100% }</code> to enable percentage heights throughout.</p>`
  },
  "margin":{
    desc:"Sets the margin area on all four sides of an element — the space outside the border. Margins are transparent (show the parent's background). Adjacent vertical margins of block elements collapse into one (the larger of the two).",
    category:"Box Model",version:"CSS1",inherited:false,animatable:true,
    syntax:`<span class="cs">.box</span> {\n  <span class="cp">margin</span>: <span class="cv">10px</span>;              <span class="cc">/* all sides */</span>\n  <span class="cp">margin</span>: <span class="cv">10px 20px</span>;         <span class="cc">/* top/bottom left/right */</span>\n  <span class="cp">margin</span>: <span class="cv">10px 20px 30px</span>;    <span class="cc">/* top left/right bottom */</span>\n  <span class="cp">margin</span>: <span class="cv">5px 10px 15px 20px</span>; <span class="cc">/* top right bottom left */</span>\n  <span class="cp">margin</span>: <span class="cv">auto</span>;             <span class="cc">/* center horizontally */</span>\n}`,
    example:`<span class="cs">.centered</span> {\n  <span class="cp">width</span>: <span class="cv">600px</span>;\n  <span class="cp">margin</span>: <span class="cv">0 auto</span>; <span class="cc">/* classic centering */</span>\n}\n<span class="cs">.spaced</span> {\n  <span class="cp">margin-block</span>: <span class="cv">2rem</span>; <span class="cc">/* modern logical property */</span>\n  <span class="cp">margin-inline</span>: <span class="cv">auto</span>;\n}`,
    values:[
      {v:"<length>",d:"Fixed margin: px, em, rem, vw"},
      {v:"<percentage>",d:"Percentage of the containing block's WIDTH (even for top/bottom)"},
      {v:"auto",d:"Browser calculates — horizontal auto centers block elements"},
      {v:"negative values",d:"Negative margins pull element outside its box (powerful but tricky)"},
    ],
    browser:{chrome:"1",firefox:"1",safari:"1",edge:"12",ie:"3"},
    notes:`<p><strong>Margin collapse</strong>: vertical margins between adjacent blocks collapse to the larger value. This doesn't happen with flex/grid children, or elements with overflow other than visible.</p>
<div class="note note-tip"><strong>Modern tip:</strong> Use <code>margin-block</code> and <code>margin-inline</code> (logical properties) for better internationalization support.</div>`
  },
  "padding":{
    desc:"Sets the padding area on all four sides — the space between the content and the border. Unlike margin, padding is affected by the element's background. Padding cannot be negative.",
    category:"Box Model",version:"CSS1",inherited:false,animatable:true,
    syntax:`<span class="cs">.box</span> {\n  <span class="cp">padding</span>: <span class="cv">20px</span>;             <span class="cc">/* all sides */</span>\n  <span class="cp">padding</span>: <span class="cv">10px 20px</span>;        <span class="cc">/* v h */</span>\n  <span class="cp">padding</span>: <span class="cv">10px 20px 30px 40px</span>; <span class="cc">/* T R B L */</span>\n  <span class="cp">padding-block</span>: <span class="cv">1rem</span>;     <span class="cc">/* logical: top + bottom */</span>\n  <span class="cp">padding-inline</span>: <span class="cv">1.5rem</span>;  <span class="cc">/* logical: left + right */</span>\n}`,
    example:`<span class="cs">.card</span> {\n  <span class="cp">padding</span>: <span class="cv">24px 32px</span>;\n  <span class="cp">background</span>: <span class="cv">#fff</span>;\n  <span class="cp">border-radius</span>: <span class="cv">12px</span>;\n}\n<span class="cs">.button</span> {\n  <span class="cp">padding</span>: <span class="cv">10px 24px</span>;\n  <span class="cp">box-sizing</span>: <span class="cv">border-box</span>;\n}`,
    values:[
      {v:"<length>",d:"Fixed padding: px, em, rem"},

    browser:{chrome:"1",firefox:"1",safari:"1",edge:"12",ie:"4"},
    notes:`<p>Padding percentages (even top/bottom) are relative to the containing block's <em>width</em> — this enables the well-known aspect-ratio hack: <code>padding-top: 56.25%</code> for 16:9.</p>`
  },
  "box-sizing":{
    desc:"Defines how the total width and height of an element is calculated. The most important CSS reset: setting it to <code>border-box</code> globally makes layout math intuitive — the declared width/height includes padding and border.",
    category:"Box Model",version:"CSS3",inherited:false,animatable:false,
    syntax:`<span class="cc">/* Global reset (best practice) */</span>\n<span class="cs">*</span>, <span class="cs">*::before</span>, <span class="cs">*::after</span> {\n  <span class="cp">box-sizing</span>: <span class="cv">border-box</span>;\n}`,
    example:`<span class="cc">/* Without border-box: actual width = 200+20+20+2+2 = 244px */</span>\n<span class="cs">.bad</span> {\n  <span class="cp">box-sizing</span>: <span class="cv">content-box</span>; <span class="cc">/* default */</span>\n  <span class="cp">width</span>: <span class="cv">200px</span>; <span class="cp">padding</span>: <span class="cv">20px</span>; <span class="cp">border</span>: <span class="cv">2px solid</span>;\n}\n<span class="cc">/* With border-box: actual width = 200px exactly */</span>\n<span class="cs">.good</span> {\n  <span class="cp">box-sizing</span>: <span class="cv">border-box</span>;\n  <span class="cp">width</span>: <span class="cv">200px</span>; <span class="cp">padding</span>: <span class="cv">20px</span>; <span class="cp">border</span>: <span class="cv">2px solid</span>;\n}`,
    values:[
      {v:"content-box",d:"Default: width/height apply to content only. Padding and border add to total size.",isDefault:true},
      {v:"border-box",d:"Width/height include content, padding, and border. Recommended for all projects."},
    ],
    browser:{chrome:"10",firefox:"29",safari:"5.1",edge:"12",ie:"8"},
    notes:`<div class="note note-tip"><strong>Best practice:</strong> Apply <code>box-sizing: border-box</code> universally via the universal selector. This is included in all modern CSS frameworks (Bootstrap, Tailwind, etc.).</div>`

  "border-radius":{
    desc:"Rounds the corners of an element's border box. Accepts 1–4 values for individual corners. Each corner can have two radii (horizontal and vertical) separated by a slash for elliptical curves.",
    category:"Box Model",version:"CSS3",inherited:false,animatable:true,
    syntax:`<span class="cs">.box</span> {\n  <span class="cp">border-radius</span>: <span class="cv">12px</span>;           <span class="cc">/* all corners */</span>\n  <span class="cp">border-radius</span>: <span class="cv">10px 20px</span>;      <span class="cc">/* TL/BR  TR/BL */</span>\n  <span class="cp">border-radius</span>: <span class="cv">50%</span>;             <span class="cc">/* circle/ellipse */</span>\n  <span class="cp">border-radius</span>: <span class="cv">10px 20px 30px 40px</span>; <span class="cc">/* each corner */</span>\n  <span class="cp">border-radius</span>: <span class="cv">50% / 30%</span>;      <span class="cc">/* elliptical */</span>\n}`,
    example:`<span class="cs">.card</span>    { <span class="cp">border-radius</span>: <span class="cv">16px</span>; }\n<span class="cs">.circle</span>  { <span class="cp">border-radius</span>: <span class="cv">50%</span>; <span class="cp">width</span>:<span class="cv">100px</span>; <span class="cp">height</span>:<span class="cv">100px</span>; }\n<span class="cs">.pill</span>    { <span class="cp">border-radius</span>: <span class="cv">9999px</span>; }\n<span class="cs">.leaf</span>    { <span class="cp">border-radius</span>: <span class="cv">0 50% 50% 50%</span>; }`,

    notes:`<p>Multiple percentage values can share the same styles: <code>0%, 100% { ... }</code>. For best performance, only animate <code>transform</code> and <code>opacity</code>.</p>`
  },
  "filter":{
    desc:"Applies graphical effects such as blur, brightness, contrast, grayscale, hue rotation, invert, opacity, saturate, and sepia to an element. Similar to image filters in photo editors. Applied before the element is composited.",
    category:"Colors & Backgrounds",version:"CSS3",inherited:false,animatable:true,
    syntax:`<span class="cs">.el</span> {\n  <span class="cp">filter</span>: <span class="cv">blur(4px)</span>;\n  <span class="cp">filter</span>: <span class="cv">brightness(1.5)</span>;\n  <span class="cp">filter</span>: <span class="cv">grayscale(100%)</span>;\n  <span class="cp">filter</span>: <span class="cv">drop-shadow(2px 4px 8px #000)</span>;\n  <span class="cp">filter</span>: <span class="cv">blur(2px) brightness(0.8) contrast(1.2)</span>;\n}`,
    example:`<span class="cs">img:hover</span>   { <span class="cp">filter</span>: <span class="cv">brightness(1.1) saturate(1.2)</span>; }\n<span class="cs">.grayscale</span>  { <span class="cp">filter</span>: <span class="cv">grayscale(1)</span>; <span class="cp">transition</span>: <span class="cv">filter 0.3s</span>; }\n<span class="cs">.dark-glass</span> { <span class="cp">filter</span>: <span class="cv">blur(10px)</span>; }\n<span class="cs">.icon-shadow</span>{ <span class="cp">filter</span>: <span class="cv">drop-shadow(0 4px 8px rgba(0,0,0,.4))</span>; }`,
    values:[
      {v:"blur(radius)",d:"Gaussian blur in px"},
      {v:"brightness(n)",d:"0=black, 1=normal, 2=double brightness"},
      {v:"contrast(n)",d:"0=grey, 1=normal, 2=double contrast"},
      {v:"grayscale(n)",d:"0–1 or 0%–100%"},
      {v:"hue-rotate(deg)",d:"Shifts colors around the hue wheel"},
      {v:"invert(n)",d:"Inverts colors (1 = full inversion)"},
      {v:"saturate(n)",d:"0=greyscale, 1=normal, >1 super-saturated"},
      {v:"sepia(n)",d:"Applies sepia tone (0–1)"},
      {v:"drop-shadow(x y blur color)",d:"Shadow following the element's alpha mask (works on PNGs/SVGs)"},
    ],
    browser:{chrome:"53",firefox:"35",safari:"9.1",edge:"12",ie:"No"},
    notes:`<div class="note note-tip"><strong>vs box-shadow:</strong> drop-shadow() follows the element's actual shape (including transparent areas), while box-shadow always follows the box model rectangle.</div>`
  },
  "clamp()":{
    desc:"A CSS math function that clamps a value between a minimum and maximum, with a preferred middle value. Perfect for fluid typography and spacing that scales with the viewport without requiring media queries.",
    category:"CSS Variables & Misc",version:"CSS4",inherited:false,animatable:true,
    syntax:`<span class="cs">.el</span> {\n  <span class="cp">font-size</span>: <span class="cv">clamp(min, preferred, max)</span>;\n  <span class="cp">font-size</span>: <span class="cv">clamp(1rem, 2.5vw, 3rem)</span>;\n  <span class="cp">width</span>: <span class="cv">clamp(300px, 50%, 800px)</span>;\n  <span class="cp">padding</span>: <span class="cv">clamp(1rem, 5vw, 3rem)</span>;\n}`,
    example:`<span class="cc">/* Fluid heading: min 1.5rem, scales with viewport, max 4rem */</span>\n<span class="cs">h1</span> {\n  <span class="cp">font-size</span>: <span class="cv">clamp(1.5rem, 5vw, 4rem)</span>;\n}\n<span class="cc">/* Fluid container padding */</span>\n<span class="cs">.container</span> {\n  <span class="cp">padding-inline</span>: <span class="cv">clamp(1rem, 5%, 4rem)</span>;\n  <span class="cp">max-width</span>: <span class="cv">clamp(320px, 90%, 1200px)</span>;\n}`,

      {v:"clamp(min, ideal, max)",d:"Returns ideal if within min–max range, otherwise clamps to min or max"},

    notes:`<div class="note note-tip"><strong>Fluid type scale:</strong> Combine clamp with calc and vw: <code>clamp(1rem, 0.5rem + 2vw, 2rem)</code>. The vw part makes it fluid, the min/max prevents it from going too small or large.</div>`

  "scroll-behavior":{
    desc:"Specifies the scrolling behavior for a scrolling box when scrolling is triggered by the navigation or CSSOM scrolling APIs. Makes anchor links smoothly animate instead of jumping.",
    category:"Scroll & Overflow",version:"CSS3",inherited:false,animatable:false,
    syntax:`<span class="cs">html</span> {\n  <span class="cp">scroll-behavior</span>: <span class="cv">smooth</span>;\n}\n<span class="cs">.scroll-container</span> {\n  <span class="cp">overflow-y</span>: <span class="cv">auto</span>;\n  <span class="cp">scroll-behavior</span>: <span class="cv">smooth</span>;\n}`,
    example:`<span class="cc">/* Apply to html for site-wide smooth scrolling */</span>\n<span class="cs">html</span> {\n  <span class="cp">scroll-behavior</span>: <span class="cv">smooth</span>;\n}\n<span class="cc">/* Respect user's reduced-motion preference */</span>\n<span class="ck">@media</span> (prefers-reduced-motion: reduce) {\n  <span class="cs">html</span> { <span class="cp">scroll-behavior</span>: <span class="cv">auto</span>; }\n}`,
    values:[
      {v:"auto",d:"Immediate scrolling (default)",isDefault:true},
      {v:"smooth",d:"Animates scrolling to the target position"},
    ],
    browser:{chrome:"61",firefox:"36",safari:"15.4",edge:"79",ie:"No"},
    notes:`<div class="note note-warn"><strong>Accessibility:</strong> Always pair smooth scrolling with <code>@media (prefers-reduced-motion: reduce)</code> to respect users who have vestibular disorders that make motion uncomfortable.</div>`
  },
  "@media":{
    desc:"The @media CSS at-rule applies a group of CSS rules only when specific conditions (media queries) match. Essential for responsive design — applying different styles based on screen size, color scheme, device type, or user preferences.",
    category:"Pseudo & At-Rules",version:"CSS2",inherited:false,animatable:false,
    syntax:`<span class="ck">@media</span> <span class="cs">screen and (min-width: 768px)</span> { }\n<span class="ck">@media</span> <span class="cs">(prefers-color-scheme: dark)</span> { }\n<span class="ck">@media</span> <span class="cs">(prefers-reduced-motion: reduce)</span> { }\n<span class="ck">@media</span> <span class="cs">print</span> { }`,
    example:`<span class="cc">/* Mobile-first approach */</span>\n<span class="cs">.grid</span> { <span class="cp">grid-template-columns</span>: <span class="cv">1fr</span>; }\n\n<span class="ck">@media</span> <span class="cs">(min-width: 768px)</span> {\n  <span class="cs">.grid</span> { <span class="cp">grid-template-columns</span>: <span class="cv">repeat(2, 1fr)</span>; }\n}\n<span class="ck">@media</span> <span class="cs">(min-width: 1024px)</span> {\n  <span class="cs">.grid</span> { <span class="cp">grid-template-columns</span>: <span class="cv">repeat(3, 1fr)</span>; }\n}\n<span class="cc">/* Dark mode */</span>\n<span class="ck">@media</span> <span class="cs">(prefers-color-scheme: dark)</span> {\n  <span class="cs">body</span> { <span class="cp">background</span>: <span class="cv">#111</span>; <span class="cp">color</span>: <span class="cv">#f0f0f0</span>; }\n}`,
    values:[
      {v:"screen",d:"Applies to color screens"},
      {v:"print",d:"Applies when printing"},
      {v:"min-width / max-width",d:"Viewport width conditions for responsive breakpoints"},
      {v:"prefers-color-scheme",d:"dark or light — user's OS theme preference"},
      {v:"prefers-reduced-motion",d:"reduce — user prefers less animation"},
      {v:"orientation",d:"portrait or landscape"},
      {v:"hover",d:"hover — device supports hover (non-touch); none — touch devices"},

    browser:{chrome:"1",firefox:"1",safari:"1",edge:"12",ie:"9"},
    notes:`<div class="note note-tip"><strong>Mobile-first:</strong> Write base styles for mobile, then use min-width queries to add complexity for larger screens. This results in less CSS overall and better performance on mobile.</div>`
  },
  ":hover":{
    desc:"The :hover CSS pseudo-class matches when the user interacts with an element with a pointing device, but hasn't necessarily activated it. Applied when a mouse cursor is positioned over an element.",
    category:"Pseudo & At-Rules",version:"CSS1",inherited:false,animatable:false,
    syntax:`<span class="cs">a:hover</span>      { <span class="cp">color</span>: <span class="cv">blue</span>; }\n<span class="cs">.btn:hover</span>  { <span class="cp">background</span>: <span class="cv">#0050c0</span>; }\n<span class="cs">.card:hover</span> { <span class="cp">transform</span>: <span class="cv">translateY(-4px)</span>; }`,
    example:`<span class="cs">.button</span> {\n  <span class="cp">background</span>: <span class="cv">#6c8bff</span>;\n  <span class="cp">transition</span>: <span class="cv">all 0.2s ease</span>;\n}\n<span class="cs">.button:hover</span> {\n  <span class="cp">background</span>: <span class="cv">#4a6fe8</span>;\n  <span class="cp">box-shadow</span>: <span class="cv">0 4px 16px rgba(108,139,255,.4)</span>;\n  <span class="cp">transform</span>: <span class="cv">translateY(-2px)</span>;\n}`,
    values:[],
    browser:{chrome:"1",firefox:"1",safari:"1",edge:"12",ie:"4"},
    notes:`<div class="note note-warn"><strong>Touch devices:</strong> :hover doesn't work reliably on touch screens. Use @media (hover: hover) to apply hover styles only on devices that support it.</div>`

  ":focus":{
    desc:"The :focus pseudo-class represents an element that has received focus — usually triggered by clicking, tapping, or tabbing into it. Critical for keyboard accessibility.",
    category:"Pseudo & At-Rules",version:"CSS1",inherited:false,animatable:false,
    syntax:`<span class="cs">input:focus</span>  { <span class="cp">outline</span>: <span class="cv">2px solid blue</span>; }\n<span class="cs">button:focus</span> { <span class="cp">box-shadow</span>: <span class="cv">0 0 0 3px rgba(108,139,255,.5)</span>; }\n<span class="cs">:focus-visible</span>{ <span class="cp">outline</span>: <span class="cv">2px solid var(--accent)</span>; }`,
    example:`<span class="cs">input:focus</span> {\n  <span class="cp">outline</span>: <span class="cv">none</span>;\n  <span class="cp">border-color</span>: <span class="cv">#6c8bff</span>;\n  <span class="cp">box-shadow</span>: <span class="cv">0 0 0 3px rgba(108,139,255,0.3)</span>;\n}\n<span class="cc">/* Modern: only show focus ring when navigating via keyboard */</span>\n<span class="cs">:focus:not(:focus-visible)</span> { <span class="cp">outline</span>: <span class="cv">none</span>; }\n<span class="cs">:focus-visible</span> { <span class="cp">outline</span>: <span class="cv">2px solid #6c8bff</span>; <span class="cp">outline-offset</span>: <span class="cv">2px</span>; }`,
    values:[],
    browser:{chrome:"1",firefox:"1",safari:"1",edge:"12",ie:"8"},
    notes:`<div class="note note-warn"><strong>Never remove outline without replacement!</strong> Removing focus styles (outline:none) without providing an alternative breaks keyboard navigation for millions of users. Use :focus-visible for modern, smarter focus indicators.</div>`
  },
  "::before":{
    desc:"The ::before pseudo-element creates a virtual first child of the matched element. Combined with the content property, it's used to insert cosmetic content before an element without changing the HTML.",
    category:"Pseudo & At-Rules",version:"CSS2",inherited:false,animatable:false,
    syntax:`<span class="cs">.element::before</span> {\n  <span class="cp">content</span>: <span class="cv">''</span>;    <span class="cc">/* required */</span>\n  <span class="cp">display</span>: <span class="cv">block</span>;\n  <span class="cc">/* additional styles */</span>\n}`,
    example:`<span class="cc">/* Decorative bullet */</span>\n<span class="cs">li::before</span> {\n  <span class="cp">content</span>: <span class="cv">'→'</span>;\n  <span class="cp">margin-right</span>: <span class="cv">8px</span>;\n  <span class="cp">color</span>: <span class="cv">#6c8bff</span>;\n}\n<span class="cc">/* Overlay effect */</span>\n<span class="cs">.hero::before</span> {\n  <span class="cp">content</span>: <span class="cv">''</span>;\n  <span class="cp">position</span>: <span class="cv">absolute</span>;\n  <span class="cp">inset</span>: <span class="cv">0</span>;\n  <span class="cp">background</span>: <span class="cv">rgba(0,0,0,0.4)</span>;\n}\n<span class="cc">/* Required fields */</span>\n<span class="cs">label.required::after</span> {\n  <span class="cp">content</span>: <span class="cv">' *'</span>;\n  <span class="cp">color</span>: <span class="cv">red</span>;\n}`,
    values:[
      {v:"content: ''",d:"Empty string — common for decorative uses"},
      {v:"content: 'text'",d:"Inserts literal text"},
      {v:"content: attr(data-*)",d:"Inserts value from HTML attribute"},
      {v:"content: counter(name)",d:"Inserts a CSS counter value"},
    ],
    browser:{chrome:"4",firefox:"3.5",safari:"3.1",edge:"12",ie:"8"},
    notes:`<p>Pseudo-elements created with ::before/::after are not in the DOM and cannot be selected by JavaScript. They must have a content property (even if empty) to render.</p>`
  },
  "text-decoration":{
    desc:"Shorthand for text-decoration-line, text-decoration-color, text-decoration-style, and text-decoration-thickness. Commonly used to add or remove underlines, overlines, and strikethroughs.",
    category:"Typography",version:"CSS1",inherited:true,animatable:false,
    syntax:`<span class="cs">a</span> {\n  <span class="cp">text-decoration</span>: <span class="cv">underline</span>;\n  <span class="cp">text-decoration</span>: <span class="cv">none</span>;\n  <span class="cp">text-decoration</span>: <span class="cv">underline dotted red 2px</span>;\n  <span class="cp">text-decoration</span>: <span class="cv">line-through</span>;\n  <span class="cp">text-decoration</span>: <span class="cv">overline</span>;\n}`,
    example:`<span class="cs">a</span>              { <span class="cp">text-decoration</span>: <span class="cv">none</span>; }\n<span class="cs">a:hover</span>        { <span class="cp">text-decoration</span>: <span class="cv">underline</span>; }\n<span class="cs">.strikethrough</span> { <span class="cp">text-decoration</span>: <span class="cv">line-through</span>; }\n<span class="cs">.fancy-link</span>    { <span class="cp">text-decoration</span>: <span class="cv">underline wavy #6c8bff 2px</span>; }`,
    values:[
      {v:"none",d:"No decoration"},
      {v:"underline",d:"Line below the text"},
      {v:"overline",d:"Line above the text"},
      {v:"line-through",d:"Line through the middle (strikethrough)"},
      {v:"dotted / dashed / wavy / solid / double",d:"Line style options"},
    ],
    browser:{chrome:"1",firefox:"1",safari:"1",edge:"12",ie:"3"},
    notes:`<p>Use <code>text-underline-offset</code> to control the distance of the underline from text, and <code>text-decoration-skip-ink</code> to prevent the underline from overlapping descenders (g, p, y).</p>`

  "cursor":{
    desc:"Sets the type of cursor to be shown when the user hovers over the element. Communicates interactivity and affordances to users.",
    category:"Display & Visibility",version:"CSS2",inherited:true,animatable:false,
    syntax:`<span class="cs">.el</span> {\n  <span class="cp">cursor</span>: <span class="cv">pointer</span>;\n  <span class="cp">cursor</span>: <span class="cv">default</span>;\n  <span class="cp">cursor</span>: <span class="cv">not-allowed</span>;\n  <span class="cp">cursor</span>: <span class="cv">grab</span>;\n  <span class="cp">cursor</span>: <span class="cv">url('cursor.png'), auto</span>;\n}`,
    example:`<span class="cs">button</span>           { <span class="cp">cursor</span>: <span class="cv">pointer</span>; }\n<span class="cs">button:disabled</span>  { <span class="cp">cursor</span>: <span class="cv">not-allowed</span>; }\n<span class="cs">.draggable</span>       { <span class="cp">cursor</span>: <span class="cv">grab</span>; }\n<span class="cs">.draggable:active</span>{ <span class="cp">cursor</span>: <span class="cv">grabbing</span>; }\n<span class="cs">.resizable</span>       { <span class="cp">cursor</span>: <span class="cv">col-resize</span>; }`,

      {v:"default",d:"Standard arrow cursor"},
      {v:"pointer",d:"Hand cursor — indicates a clickable element"},
      {v:"text",d:"I-beam — indicates selectable text"},
      {v:"not-allowed",d:"Circle with line — element is disabled"},
      {v:"grab / grabbing",d:"Hand cursor for drag interactions"},
      {v:"crosshair",d:"Precise selection (drawing, crop tools)"},
      {v:"wait / progress",d:"Loading indicators"},

      {v:"col-resize / row-resize",d:"Resize handles"},

};

function getBrowserDots(b) {
  const browsers = [
    {name:'Chrome', v:b.chrome},
    {name:'Firefox', v:b.firefox},
    {name:'Safari', v:b.safari},
    {name:'Edge', v:b.edge},
    {name:'IE', v:b.ie},
  ];
  return browsers.map(br => {
    const cls = br.v === 'No' ? 'bp-no' : (br.v === 'Partial' ? 'bp-partial' : 'bp-yes');
    const icon = br.v === 'No' ? '✕' : (br.v === 'Partial' ? '~' : '✓');
    return `<span class="browser-pill ${cls}">${icon} ${br.name} ${br.v !== 'No' && br.v !== 'Partial' ? br.v+'+' : ''}</span>`;
  }).join('');
}

function renderProp(prop) {
  const d = DB[prop];
  if (!d) {
    return `
      <div class="prop-hero">
        <div class="hero-breadcrumb">CSS Reference <span>▸ ${prop}</span></div>
        <div class="hero-prop-name"><span class="pname">${prop}</span></div>
        <div class="hero-desc">A valid CSS property. Refer to MDN Web Docs for detailed documentation.</div>
        <div class="hero-badges"><span class="hbadge hb-cat">CSS</span></div>
      </div>
      <div class="prop-content">
        <div class="section"><p>Select another property from the sidebar, or visit <a href="https://developer.mozilla.org/en-US/docs/Web/CSS/${encodeURIComponent(prop)}" target="_blank" style="color:var(--accent)">MDN Web Docs</a> for full documentation.</p></div>
      </div>`;
  }

  let valuesHTML = '';
  if (d.values && d.values.length) {
    valuesHTML = `<div class="section">
      <div class="section-title">Accepted Values</div>
      <table class="val-table">
        <thead><tr><th>Value</th><th>Description</th></tr></thead>
        <tbody>${d.values.map(v=>`<tr>
          <td><span class="val-name">${v.v}</span>${v.isDefault?' <span class="val-default">default</span>':''}</td>
          <td class="val-desc">${v.d}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
  }

  return `
    <div class="prop-hero">
      <div class="hero-breadcrumb">CSS Reference <span>▸ ${d.category} ▸ ${prop}</span></div>
      <div class="hero-prop-name"><span class="pname">${prop}</span><span class="colon">: …;</span></div>
      <div class="hero-desc">${d.desc}</div>
      <div class="hero-badges">
        <span class="hbadge hb-cat">${d.category}</span>
        <span class="hbadge hb-ver">${d.version}</span>
        ${d.inherited ? '<span class="hbadge hb-inh">Inherited</span>' : ''}
        ${d.animatable ? '<span class="hbadge hb-new">Animatable</span>' : ''}
      </div>
    </div>
    <div class="prop-content">
      <div class="section">
        <div class="section-title">Syntax</div>
        <div class="code-block">
          <div class="code-header"><span class="code-lang">CSS</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
          <pre>${d.syntax}</pre>
        </div>
      </div>
      <div class="section">
        <div class="section-title">Example</div>
        <div class="code-block">
          <div class="code-header"><span class="code-lang">CSS Example</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
          <pre>${d.example}</pre>
        </div>
      </div>
      ${valuesHTML}
      <div class="section">
        <div class="section-title">Technical Info</div>
        <div class="info-grid">
          <div class="info-card"><div class="ic-label">CSS Version</div><div class="ic-val">${d.version}</div></div>
          <div class="info-card"><div class="ic-label">Inherited</div><div class="ic-val ${d.inherited?'yes':'no'}">${d.inherited ? 'Yes' : 'No'}</div></div>
          <div class="info-card"><div class="ic-label">Animatable</div><div class="ic-val ${d.animatable?'yes':'no'}">${d.animatable ? 'Yes' : 'No'}</div></div>
        </div>
      </div>
      ${d.browser ? `<div class="section">
        <div class="section-title">Browser Support</div>
        <div class="browser-row">${getBrowserDots(d.browser)}</div>
      </div>` : ''}
      <div class="section">
        <div class="section-title">Notes & Best Practices</div>
        ${d.notes}
      </div>
    </div>`;
}

function copyCode(btn) {
  const text = btn.closest('.code-block').querySelector('pre').innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.style.color = 'var(--green)';
    setTimeout(() => { btn.textContent = 'Copy'; btn.style.color = ''; }, 2000);
  });
}

const params = new URLSearchParams(window.location.search);
const prop = params.get('prop');
if (prop) {
  document.getElementById('welcome').style.display = 'none';
  const pp = document.getElementById('prop-page');
  pp.style.display = 'block';
  pp.innerHTML = renderProp(prop);
  document.title = `${prop} — CSS Reference`;
}
</script>
</body>
</html>
