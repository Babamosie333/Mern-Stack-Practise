<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Sidebar</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#07090f; --bg2:#0e1120; --accent:#6c8bff; --accent2:#a259ff; --accent3:#ff6584;
      --green:#00e5a0; --cyan:#38d9f5; --yellow:#ffd580; --orange:#ff8c69;
      --text:#dde2f5; --muted:#5a6385; --border:#1a1f36; --hover:#111528;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow:hidden}
    .sidebar{height:100%;display:flex;flex-direction:column;border-right:1px solid var(--border);background:linear-gradient(180deg,#07090f 0%,#080b14 100%)}
    .top{padding:14px 12px 10px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
    .brand{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;margin-bottom:10px;color:var(--accent)}
    .search{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--text);outline:none;font-family:'JetBrains Mono',monospace;font-size:12px}
    .search:focus{border-color:var(--accent)}
    .stat{display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}
    .list{overflow-y:auto;padding:6px 0 14px;flex:1}
    .cat-title{display:flex;align-items:center;gap:8px;padding:10px 14px 4px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;user-select:none;cursor:pointer}
    .cat-title::after{content:'';flex:1;height:1px;background:var(--border)}
    .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
    .cat-count{margin-left:auto;color:var(--accent)}
    .items{padding:0 8px 6px}
    .cat-title.collapsed + .items{display:none}
    .item{display:flex;align-items:center;gap:8px;padding:9px 11px;margin:4px 0;border-left:2px solid transparent;border-radius:0 10px 10px 0;cursor:pointer;transition:.15s;background:transparent;text-decoration:none}
    .item:hover{background:var(--hover);border-left-color:rgba(108,139,255,.45)}
    .item.active{background:rgba(108,139,255,.08);border-left-color:var(--accent)}
    .name{flex:1;font-family:'JetBrains Mono',monospace;color:var(--text);font-size:12px;font-weight:600}
    .badge{font-family:'JetBrains Mono',monospace;font-size:9px;padding:1px 6px;border-radius:999px;border:1px solid transparent;white-space:nowrap}
    .new{background:rgba(0,229,160,.1);color:var(--green);border-color:rgba(0,229,160,.22)}
    .exp{background:rgba(255,101,132,.1);color:var(--accent3);border-color:rgba(255,101,132,.22)}
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="top">
      <div class="brand">CSS Properties</div>
      <input id="search" class="search" type="text" placeholder="Search property..." autocomplete="off" />
      <div class="stat"><span>Properties</span><span id="count">0 shown</span></div>
    </div>
    <div id="list" class="list"></div>
  </div>

  <script>
    const categories = [
      { name:"Box Model", color:"#6c8bff", props:["width","height","margin","padding","box-sizing","border-radius","box-shadow"] },
      { name:"Display & Visibility", color:"#38d9f5", props:["display","visibility","opacity"] },
      { name:"Positioning", color:"#a259ff", props:["position","top","right","bottom","left","z-index","float","clear"] },
      { name:"Flexbox", color:"#00e5a0", props:["display-flex","flex","flex-direction","flex-wrap","justify-content","align-items","align-self","align-content","order","gap"] },
      { name:"Grid", color:"#ff8c69", props:["display-grid","grid-template-columns","grid-template-rows","grid-template-areas","grid-column","grid-row","grid-area","grid-auto-flow","place-items","place-content","place-self"] },
      { name:"Colors & Backgrounds", color:"#ffd580", props:["color","background","background-color","background-image","background-size","background-position","background-repeat"] },
      { name:"Typography", color:"#ff6584", props:["font","font-family","font-size","font-weight","font-style","line-height","letter-spacing","text-align","text-decoration","text-transform","text-shadow"] },
      { name:"Borders", color:"#a259ff", props:["border","border-width","border-style","border-color","border-radius","outline","outline-offset"] },
      { name:"Transitions", color:"#00e5a0", props:["transition","transition-property","transition-duration","transition-timing-function","transition-delay"] },
      { name:"Animations", color:"#38d9f5", props:["animation","animation-name","animation-duration","animation-timing-function","animation-delay","animation-iteration-count","animation-direction","animation-fill-mode"] },
      { name:"Transforms", color:"#ff8c69", props:["transform","transform-origin","perspective","backface-visibility"] },
      { name:"Overflow", color:"#6c8bff", props:["overflow","overflow-x","overflow-y","scroll-behavior"] }
    ];

    const titles = {
      "width":"Width","height":"Height","margin":"Margin","padding":"Padding","box-sizing":"Box sizing",
      "border-radius":"Border radius","box-shadow":"Box shadow","display":"Display","visibility":"Visibility",
      "opacity":"Opacity","position":"Position","top":"Top","right":"Right","bottom":"Bottom","left":"Left",
      "z-index":"Z-index","float":"Float","clear":"Clear","display-flex":"Flexbox","flex":"Flex",
      "flex-direction":"Flex direction","flex-wrap":"Flex wrap","justify-content":"Justify content","align-items":"Align items",
      "align-self":"Align self","align-content":"Align content","order":"Order","gap":"Gap","display-grid":"Grid",
      "grid-template-columns":"Grid template columns","grid-template-rows":"Grid template rows","grid-template-areas":"Grid template areas",
      "grid-column":"Grid column","grid-row":"Grid row","grid-area":"Grid area","grid-auto-flow":"Grid auto flow",
      "place-items":"Place items","place-content":"Place content","place-self":"Place self","color":"Color",
      "background":"Background","background-color":"Background color","background-image":"Background image",
      "background-size":"Background size","background-position":"Background position","background-repeat":"Background repeat",
      "font":"Font","font-family":"Font family","font-size":"Font size","font-weight":"Font weight","font-style":"Font style",
      "line-height":"Line height","letter-spacing":"Letter spacing","text-align":"Text align","text-decoration":"Text decoration",
      "text-transform":"Text transform","text-shadow":"Text shadow","border":"Border","border-width":"Border width",
      "border-style":"Border style","border-color":"Border color","outline":"Outline","outline-offset":"Outline offset",
      "transition":"Transition","transition-property":"Transition property","transition-duration":"Transition duration",
      "transition-timing-function":"Transition timing function","transition-delay":"Transition delay","animation":"Animation",
      "animation-name":"Animation name","animation-duration":"Animation duration","animation-timing-function":"Animation timing function",
      "animation-delay":"Animation delay","animation-iteration-count":"Animation iteration count","animation-direction":"Animation direction",
      "animation-fill-mode":"Animation fill mode","transform":"Transform","transform-origin":"Transform origin",
      "perspective":"Perspective","backface-visibility":"Backface visibility","overflow":"Overflow","overflow-x":"Overflow x",
      "overflow-y":"Overflow y","scroll-behavior":"Scroll behavior"
    };

    function badge(slug){
      if(["display-flex","display-grid"].includes(slug)) return '<span class="badge new">new</span>';
      if(["box-sizing","position","transform","animation","transition"].includes(slug)) return '<span class="badge exp">exp</span>';
      return '';
    }

    function openContent(slug){
      window.parent.frames['content'].location.href = 'content.html?prop=' + encodeURIComponent(slug);
    }

    function render(q=''){
      const term = q.trim().toLowerCase();
      const list = document.getElementById('list');
      list.innerHTML = '';
      let shown = 0;

      categories.forEach(cat => {
        const filtered = cat.props.filter(p => p.toLowerCase().includes(term) || cat.name.toLowerCase().includes(term));
        if(!filtered.length) return;
        shown += filtered.length;

        const h = document.createElement('div');
        h.className = 'cat-title';
        h.innerHTML = `<span class="dot" style="background:${cat.color}"></span>${cat.name}<span class="cat-count">${filtered.length}</span>`;
        h.onclick = () => h.classList.toggle('collapsed');
        list.appendChild(h);

        const items = document.createElement('div');
        items.className = 'items';
        filtered.forEach(slug => {
          const a = document.createElement('a');
          a.href = '#';
          a.className = 'item';
          a.dataset.slug = slug;
          a.innerHTML = `<span class="name">${titles[slug] || slug}</span>${badge(slug)}`;
          a.onclick = (e) => {
            e.preventDefault();
            document.querySelectorAll('.item.active').forEach(x => x.classList.remove('active'));
            a.classList.add('active');
            openContent(slug);
          };
          items.appendChild(a);
        });
        list.appendChild(items);
      });

      document.getElementById('count').textContent = shown + ' shown';
      if(!shown) list.innerHTML = '<div style="padding:18px 14px;text-align:center;color:var(--muted);font-family:JetBrains Mono,monospace;font-size:11px;">No matching properties.</div>';
      const first = document.querySelector('.item');
      if(first && !document.querySelector('.item.active')) first.classList.add('active');
    }

    document.getElementById('search').addEventListener('input', e => render(e.target.value));
    render();
  </script>
</body>
</html>
