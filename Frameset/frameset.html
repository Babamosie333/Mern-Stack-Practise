<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <title>HTML Tags Reference — Complete Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0c10;
      --bg-nav: #0d1117;
      --accent: #f0a500;
      --accent2: #e06c35;
      --text-light: #e6edf3;
      --text-muted: #8b949e;
      --border: #21262d;
      --glow: 0 0 20px rgba(240,165,0,0.15);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; background:var(--bg-dark); font-family:'Sora',sans-serif; overflow:hidden; }

    #navbar {
      position:fixed; top:0; left:0; right:0; height:58px;
      background:linear-gradient(90deg,#0d1117 0%,#111820 100%);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 28px; z-index:999;
      box-shadow:0 2px 24px rgba(0,0,0,0.7);
    }
    .nav-brand { display:flex; align-items:center; gap:12px; text-decoration:none; cursor:pointer; }
    .nav-logo {
      width:38px; height:38px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border-radius:9px; display:flex; align-items:center; justify-content:center;
      font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700;
      color:#0a0c10; box-shadow:var(--glow); flex-shrink:0;
    }
    .nav-title-wrap { display:flex; flex-direction:column; line-height:1; }
    .nav-title { font-size:16px; font-weight:700; color:var(--text-light); letter-spacing:0.3px; }
    .nav-subtitle { font-size:10px; color:var(--text-muted); letter-spacing:1.8px; text-transform:uppercase; margin-top:3px; font-family:'JetBrains Mono',monospace; }

    .nav-center {
      display:flex; align-items:center; gap:8px;
      background:rgba(255,255,255,0.03); border:1px solid var(--border);
      border-radius:8px; padding:7px 16px;
    }
    .nav-center-text { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--text-muted); }
    .nav-center-text span { color:var(--accent); }

    .nav-right { display:flex; align-items:center; gap:14px; }
    .nav-badge {
      padding:4px 12px; border-radius:20px; font-size:10px;
      font-family:'JetBrains Mono',monospace; font-weight:600;
      letter-spacing:1px; text-transform:uppercase;
    }
    .badge-total { background:rgba(240,165,0,0.12); color:var(--accent); border:1px solid rgba(240,165,0,0.3); }
    .badge-version { background:rgba(224,108,53,0.12); color:var(--accent2); border:1px solid rgba(224,108,53,0.3); }
    .nav-dot {
      width:8px; height:8px; border-radius:50%;
      background:#3fb950; box-shadow:0 0 10px rgba(63,185,80,0.7);
      animation:pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    #frame-container {
      position:fixed; top:58px; left:0; right:0; bottom:0;
      display:flex;
    }
    #sidebar-frame {
      width:262px; min-width:180px; border:none;
      background:#0d1117; flex-shrink:0;
    }
    #divider {
      width:4px; background:var(--border); cursor:col-resize;
      transition:background 0.2s; flex-shrink:0;
    }
    #divider:hover, #divider.dragging { background:var(--accent); }
    #content-frame { flex:1; border:none; background:#fff; }
  </style>
</head>
<body>
  <nav id="navbar">
    <div class="nav-brand" onclick="document.getElementById('content-frame').src='content.html'">
      <div class="nav-logo">&lt;/&gt;</div>
      <div class="nav-title-wrap">
        <span class="nav-title">HTML Reference</span>
        <span class="nav-subtitle">Complete Tag Library</span>
      </div>
    </div>
    <div class="nav-center">
      <span class="nav-center-text">← Select a tag &nbsp;|&nbsp; <span>View Theory on Right →</span></span>
    </div>
    <div class="nav-right">
      <span class="nav-badge badge-total">140+ Tags</span>
      <span class="nav-badge badge-version">HTML 5.3</span>
      <div class="nav-dot" title="Live Reference"></div>
    </div>
  </nav>

  <div id="frame-container">
    <iframe id="sidebar-frame" src="/Frameset/sidebar.html" frameborder="0" scrolling="no" title="Navigation"></iframe>
    <div id="divider"></div>
    <iframe id="content-frame" src="/Frameset/content.html" frameborder="0"  title="Content" ></iframe>
  </div>

  <script>
    const divider = document.getElementById('divider');
    const sf = document.getElementById('sidebar-frame');
    let drag = false;
    divider.addEventListener('mousedown', () => { drag=true; divider.classList.add('dragging'); document.body.style.cssText='cursor:col-resize;user-select:none'; });
    document.addEventListener('mousemove', e => {
      if(!drag) return;
      const r = document.getElementById('frame-container').getBoundingClientRect();
      sf.style.width = Math.max(180, Math.min(440, e.clientX - r.left)) + 'px';
    });
    document.addEventListener('mouseup', () => { drag=false; divider.classList.remove('dragging'); document.body.style.cssText=''; });
  </script>
</body>
</html>
