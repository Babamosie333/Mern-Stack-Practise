    notes:`<p>Don't use &lt;hr&gt; just for visual decoration — use CSS borders for that. &lt;hr&gt; has semantic meaning: a thematic shift. Screen readers may announce it to users.</p>`,
    info:{display:"block",selfClose:"Yes",block:"Yes",inline:"No"}
  },
  "label": {
    desc:"The label element represents a caption for an item in a user interface. Clicking a label focuses its associated control. It can be associated via the 'for' attribute matching an input's id, or by wrapping the input.",
    category:"Forms", type:"Inline",
    syntax:`&lt;<span class="ht">label</span> <span class="ha">for</span>=<span class="hv">"inputId"</span>&gt;Label Text&lt;/<span class="ht">label</span>&gt;`,
    example:`<span class="hc">&lt;!-- Using 'for' attribute --&gt;</span>\n&lt;<span class="ht">label</span> <span class="ha">for</span>=<span class="hv">"name"</span>&gt;Full Name:&lt;/<span class="ht">label</span>&gt;\n&lt;<span class="ht">input</span> <span class="ha">type</span>=<span class="hv">"text"</span> <span class="ha">id</span>=<span class="hv">"name"</span>&gt;\n<span class="hc">&lt;!-- Wrapping method --&gt;</span>\n&lt;<span class="ht">label</span>&gt;\n  &lt;<span class="ht">input</span> <span class="ha">type</span>=<span class="hv">"checkbox"</span>&gt; I agree to the terms\n&lt;/<span class="ht">label</span>&gt;`,
    attrs:[{n:"for",t:"id",d:"References the id of the form control this label is associated with"}],
    notes:`<p>Always associate labels with inputs — it's critical for accessibility. Screen readers announce the label when the input is focused. Labels also increase the clickable area for checkboxes and radio buttons.</p>`,
    info:{display:"inline",selfClose:"No",block:"No",inline:"Yes"}
  },
  "select": {
    desc:"The select element creates a dropdown selection control. It contains &lt;option&gt; elements and optionally &lt;optgroup&gt; for grouped options. The multiple attribute allows selecting more than one option.",
    category:"Forms", type:"Inline",
    syntax:`&lt;<span class="ht">select</span> <span class="ha">name</span>=<span class="hv">"choice"</span>&gt;&lt;<span class="ht">option</span>&gt;...&lt;/<span class="ht">option</span>&gt;&lt;/<span class="ht">select</span>&gt;`,
    example:`&lt;<span class="ht">select</span> <span class="ha">name</span>=<span class="hv">"country"</span> <span class="ha">id</span>=<span class="hv">"country"</span>&gt;\n  &lt;<span class="ht">option</span> <span class="ha">value</span>=<span class="hv">""</span>&gt;Select a country&lt;/<span class="ht">option</span>&gt;\n  &lt;<span class="ht">optgroup</span> <span class="ha">label</span>=<span class="hv">"Asia"</span>&gt;\n    &lt;<span class="ht">option</span> <span class="ha">value</span>=<span class="hv">"in"</span>&gt;India&lt;/<span class="ht">option</span>&gt;\n    &lt;<span class="ht">option</span> <span class="ha">value</span>=<span class="hv">"cn"</span>&gt;China&lt;/<span class="ht">option</span>&gt;\n  &lt;/<span class="ht">optgroup</span>&gt;\n  &lt;<span class="ht">optgroup</span> <span class="ha">label</span>=<span class="hv">"Europe"</span>&gt;\n    &lt;<span class="ht">option</span> <span class="ha">value</span>=<span class="hv">"fr"</span>&gt;France&lt;/<span class="ht">option</span>&gt;\n  &lt;/<span class="ht">optgroup</span>&gt;\n&lt;/<span class="ht">select</span>&gt;`,
    attrs:[
      {n:"name",t:"string",d:"Name for form submission"},
      {n:"multiple",t:"boolean",d:"Allows multiple selections (use Ctrl/Cmd + click)"},
      {n:"size",t:"number",d:"Number of visible options"},
      {n:"required",t:"boolean",d:"At least one option must be selected"},
      {n:"disabled",t:"boolean",d:"Disables the dropdown"}
    ],
    notes:`<p>Styling &lt;select&gt; elements across browsers is notoriously difficult. Consider custom dropdown libraries for consistent cross-browser appearance. For searchable dropdowns, use &lt;input&gt; with &lt;datalist&gt;.</p>`,
    info:{display:"inline-block",selfClose:"No",block:"No",inline:"Yes"}
  },
  "textarea": {
    desc:"The textarea element represents a multiline plain-text editing control. Unlike &lt;input type='text'&gt;, it allows multiple lines and is resizable. The content between tags is the default value.",
    category:"Forms", type:"Inline",
    syntax:`&lt;<span class="ht">textarea</span> <span class="ha">rows</span>=<span class="hv">"4"</span> <span class="ha">cols</span>=<span class="hv">"50"</span>&gt;&lt;/<span class="ht">textarea</span>&gt;`,
    example:`&lt;<span class="ht">label</span> <span class="ha">for</span>=<span class="hv">"msg"</span>&gt;Message:&lt;/<span class="ht">label</span>&gt;\n&lt;<span class="ht">textarea</span>\n  <span class="ha">id</span>=<span class="hv">"msg"</span>\n  <span class="ha">name</span>=<span class="hv">"message"</span>\n  <span class="ha">rows</span>=<span class="hv">"5"</span>\n  <span class="ha">placeholder</span>=<span class="hv">"Type your message here..."</span>\n  <span class="ha">maxlength</span>=<span class="hv">"500"</span>\n  <span class="ha">required</span>&gt;\n&lt;/<span class="ht">textarea</span>&gt;`,
    attrs:[
      {n:"rows",t:"number",d:"Visible number of text lines"},
      {n:"cols",t:"number",d:"Visible width in average character widths"},
      {n:"placeholder",t:"string",d:"Hint text shown when empty"},
      {n:"maxlength",t:"number",d:"Maximum number of characters allowed"},
      {n:"minlength",t:"number",d:"Minimum number of characters required"},
      {n:"resize",t:"CSS",d:"Control via CSS: none, both, horizontal, vertical"},
      {n:"wrap",t:"soft|hard",d:"How text is wrapped when submitted"}
    ],
    notes:`<p>Control resize behaviour with CSS: <code style="color:var(--accent)">resize: none</code> disables it. Don't put whitespace between opening and closing tags unless you want default content with leading/trailing spaces.</p>`,
    info:{display:"inline-block",selfClose:"No",block:"No",inline:"Yes"}
  },
  "picture": {
    desc:"The picture element is a container for multiple image sources. It allows more flexible specification of image resources for art direction (different crops) and format selection (WebP vs JPEG fallback).",
    category:"Images & Multimedia", type:"Inline",
    syntax:`&lt;<span class="ht">picture</span>&gt;...&lt;/<span class="ht">picture</span>&gt;`,
    example:`&lt;<span class="ht">picture</span>&gt;\n  <span class="hc">&lt;!-- Modern format --&gt;</span>\n  &lt;<span class="ht">source</span> <span class="ha">srcset</span>=<span class="hv">"image.avif"</span> <span class="ha">type</span>=<span class="hv">"image/avif"</span>&gt;\n  &lt;<span class="ht">source</span> <span class="ha">srcset</span>=<span class="hv">"image.webp"</span> <span class="ha">type</span>=<span class="hv">"image/webp"</span>&gt;\n  <span class="hc">&lt;!-- Fallback --&gt;</span>\n  &lt;<span class="ht">img</span> <span class="ha">src</span>=<span class="hv">"image.jpg"</span> <span class="ha">alt</span>=<span class="hv">"Description"</span>&gt;\n&lt;/<span class="ht">picture</span>&gt;\n<span class="hc">&lt;!-- Art direction --&gt;</span>\n&lt;<span class="ht">picture</span>&gt;\n  &lt;<span class="ht">source</span> <span class="ha">media</span>=<span class="hv">"(max-width: 600px)"</span> <span class="ha">srcset</span>=<span class="hv">"portrait.jpg"</span>&gt;\n  &lt;<span class="ht">img</span> <span class="ha">src</span>=<span class="hv">"landscape.jpg"</span> <span class="ha">alt</span>=<span class="hv">"Hero image"</span>&gt;\n&lt;/<span class="ht">picture</span>&gt;`,
    attrs:[],
    notes:`<p>The browser picks the first &lt;source&gt; whose media condition and type are supported. Always include an &lt;img&gt; fallback inside &lt;picture&gt; — it's required and also defines the alt text.</p>`,
    info:{display:"inline",selfClose:"No",block:"No",inline:"Yes"}
  },
  "svg": {
    desc:"The svg element is a container that defines an SVG (Scalable Vector Graphics) image. SVGs are XML-based, resolution-independent, and can be styled with CSS and scripted with JavaScript. Perfect for icons, logos, and illustrations.",
    category:"Embedded Content", type:"Inline/Block",
    syntax:`&lt;<span class="ht">svg</span> <span class="ha">xmlns</span>=<span class="hv">"http://www.w3.org/2000/svg"</span> <span class="ha">viewBox</span>=<span class="hv">"0 0 100 100"</span>&gt;...&lt;/<span class="ht">svg</span>&gt;`,
    example:`&lt;<span class="ht">svg</span> <span class="ha">xmlns</span>=<span class="hv">"http://www.w3.org/2000/svg"</span> <span class="ha">viewBox</span>=<span class="hv">"0 0 100 100"</span> <span class="ha">width</span>=<span class="hv">"100"</span> <span class="ha">height</span>=<span class="hv">"100"</span>&gt;\n  &lt;<span class="ht">circle</span> <span class="ha">cx</span>=<span class="hv">"50"</span> <span class="ha">cy</span>=<span class="hv">"50"</span> <span class="ha">r</span>=<span class="hv">"40"</span> <span class="ha">fill</span>=<span class="hv">"#f0a500"</span>/&gt;\n  &lt;<span class="ht">text</span> <span class="ha">x</span>=<span class="hv">"50"</span> <span class="ha">y</span>=<span class="hv">"55"</span> <span class="ha">text-anchor</span>=<span class="hv">"middle"</span> <span class="ha">fill</span>=<span class="hv">"white"</span>&gt;SVG&lt;/<span class="ht">text</span>&gt;\n&lt;/<span class="ht">svg</span>&gt;`,
    attrs:[
      {n:"viewBox",t:"string",d:"Defines coordinate system (minX minY width height)"},
      {n:"width/height",t:"number|string",d:"Dimensions (omit to make it fluid)"},
      {n:"xmlns",t:"URL",d:"Required namespace for SVG"},
      {n:"fill",t:"color",d:"Default fill color for SVG shapes"},
      {n:"stroke",t:"color",d:"Default stroke color"}
    ],
    notes:`<p>Inline SVG (directly in HTML) allows CSS styling and JavaScript access. Use <code style="color:var(--accent)">&lt;title&gt;</code> and <code style="color:var(--accent)">aria-labelledby</code> inside SVG for accessibility.</p>`,
    info:{display:"inline",selfClose:"No",block:"No",inline:"Yes"}
  },
  "template": {
    desc:"The template element holds HTML that is not rendered immediately when a page is loaded. The content is instantiated via JavaScript. It is used in Web Components to define reusable markup structures.",
    category:"Scripting & Templates", type:"Metadata",
    syntax:`&lt;<span class="ht">template</span> <span class="ha">id</span>=<span class="hv">"myTemplate"</span>&gt;...&lt;/<span class="ht">template</span>&gt;`,
    example:`&lt;<span class="ht">template</span> <span class="ha">id</span>=<span class="hv">"card-template"</span>&gt;\n  &lt;<span class="ht">div</span> <span class="ha">class</span>=<span class="hv">"card"</span>&gt;\n    &lt;<span class="ht">h3</span> <span class="ha">class</span>=<span class="hv">"card-title"</span>&gt;&lt;/<span class="ht">h3</span>&gt;\n    &lt;<span class="ht">p</span> <span class="ha">class</span>=<span class="hv">"card-body"</span>&gt;&lt;/<span class="ht">p</span>&gt;\n  &lt;/<span class="ht">div</span>&gt;\n&lt;/<span class="ht">template</span>&gt;\n&lt;<span class="ht">script</span>&gt;\n  const tmpl = document.getElementById('card-template');\n  const clone = tmpl.content.cloneNode(true);\n  clone.querySelector('.card-title').textContent = 'Hello!';\n  document.body.appendChild(clone);\n&lt;/<span class="ht">script</span>&gt;`,
    attrs:[],
    notes:`<p>Template content is inert — scripts don't run, images don't load until the template is used. Access content via <code style="color:var(--accent)">template.content</code> (a DocumentFragment).</p>`,
    info:{display:"none",selfClose:"No",block:"N/A",inline:"No"}
  },
  "frameset": {
    desc:"The frameset element was used to define a set of frames (or windows) in an HTML document. Each frame could display a separate HTML document. It replaced the &lt;body&gt; element. DEPRECATED in HTML5 — use CSS layouts or &lt;iframe&gt; instead.",
    category:"Frames (Legacy)", type:"Deprecated", deprecated:true,
    syntax:`&lt;<span class="ht">frameset</span> <span class="ha">cols</span>=<span class="hv">"25%,75%"</span>&gt;...&lt;/<span class="ht">frameset</span>&gt;`,
    example:`<span class="hc">&lt;!-- HTML 4 / XHTML only - DO NOT USE in HTML5 --&gt;</span>\n&lt;!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.01 Frameset//EN"&gt;\n&lt;<span class="ht">html</span>&gt;\n  &lt;<span class="ht">head</span>&gt;&lt;<span class="ht">title</span>&gt;Frames&lt;/<span class="ht">title</span>&gt;&lt;/<span class="ht">head</span>&gt;\n  &lt;<span class="ht">frameset</span> <span class="ha">cols</span>=<span class="hv">"200,*"</span>&gt;\n    &lt;<span class="ht">frame</span> <span class="ha">src</span>=<span class="hv">"sidebar.html"</span> <span class="ha">name</span>=<span class="hv">"sidebar"</span>&gt;\n    &lt;<span class="ht">frame</span> <span class="ha">src</span>=<span class="hv">"main.html"</span> <span class="ha">name</span>=<span class="hv">"main"</span>&gt;\n  &lt;/<span class="ht">frameset</span>&gt;\n&lt;/<span class="ht">html</span>&gt;`,
    attrs:[
      {n:"cols",t:"string",d:"Comma-separated column widths (pixels, %, or *)"},
      {n:"rows",t:"string",d:"Comma-separated row heights"},
      {n:"border",t:"number",d:"Width of frame borders in pixels"}
    ],
    notes:`<p class="note note-warn"><strong>⚠️ Deprecated:</strong> Frameset is not supported in HTML5. Use CSS Flexbox/Grid for layouts and &lt;iframe&gt; for embedding external content. Search engines and screen readers had poor frameset support.</p>`,
    info:{display:"N/A",selfClose:"No",block:"N/A",inline:"N/A"}
  },
  "frame": {
    desc:"The frame element defined individual windows (panes) inside a &lt;frameset&gt;. Each frame displayed a separate HTML document independently. DEPRECATED in HTML5 — use &lt;iframe&gt; for similar functionality.",
    category:"Frames (Legacy)", type:"Deprecated/Void", deprecated:true, void:true,
    syntax:`&lt;<span class="ht">frame</span> <span class="ha">src</span>=<span class="hv">"page.html"</span> <span class="ha">name</span>=<span class="hv">"frameName"</span>&gt;`,
    example:`<span class="hc">&lt;!-- HTML 4 only - DEPRECATED --&gt;</span>\n&lt;<span class="ht">frameset</span> <span class="ha">rows</span>=<span class="hv">"20%,80%"</span>&gt;\n  &lt;<span class="ht">frame</span> <span class="ha">src</span>=<span class="hv">"nav.html"</span> <span class="ha">name</span>=<span class="hv">"nav"</span> <span class="ha">scrolling</span>=<span class="hv">"no"</span>&gt;\n  &lt;<span class="ht">frame</span> <span class="ha">src</span>=<span class="hv">"content.html"</span> <span class="ha">name</span>=<span class="hv">"content"</span>&gt;\n&lt;/<span class="ht">frameset</span>&gt;`,
    attrs:[
      {n:"src",t:"URL",d:"URL of the document to display in this frame"},
      {n:"name",t:"string",d:"Name used as target for links"},
      {n:"scrolling",t:"yes|no|auto",d:"Controls scrollbars"},
      {n:"noresize",t:"boolean",d:"Prevents user resizing"},
      {n:"frameborder",t:"0|1",d:"Shows or hides frame border"}
    ],
    notes:`<p class="note note-warn"><strong>⚠️ Deprecated:</strong> The frame element is obsolete. Modern equivalent is &lt;iframe&gt; which works inside the document body and has better accessibility and security features.</p>`,
    info:{display:"N/A",selfClose:"Yes",block:"N/A",inline:"N/A"}
  },
  "address": {
    desc:"The address element indicates that the enclosed HTML provides contact information for a person or people, or for an organization. Typically rendered in italic. It often appears inside &lt;footer&gt; elements.",
    category:"Content Sectioning", type:"Block-level",
    syntax:`&lt;<span class="ht">address</span>&gt;...&lt;/<span class="ht">address</span>&gt;`,
    example:`&lt;<span class="ht">address</span>&gt;\n  &lt;<span class="ht">strong</span>&gt;Mozilla Corporation&lt;/<span class="ht">strong</span>&gt;&lt;<span class="ht">br</span>&gt;\n  331 E. Evelyn Avenue&lt;<span class="ht">br</span>&gt;\n  Mountain View, CA 94041&lt;<span class="ht">br</span>&gt;\n  &lt;<span class="ht">a</span> <span class="ha">href</span>=<span class="hv">"mailto:info@mozilla.org"</span>&gt;info@mozilla.org&lt;/<span class="ht">a</span>&gt;\n&lt;/<span class="ht">address</span>&gt;`,
    attrs:[],
    notes:`<p>The &lt;address&gt; element is not for postal addresses in general — only for contact information related to the nearest &lt;article&gt; or &lt;body&gt; ancestor. Don't use it for arbitrary addresses.</p>`,
    info:{display:"block",selfClose:"No",block:"Yes",inline:"No"}
  },
  "figure": {
    desc:"The figure element represents self-contained content, optionally with a caption (&lt;figcaption&gt;). It is used for images, illustrations, diagrams, code listings, and other content that is referenced from the main flow but could stand alone.",
    category:"Text Content", type:"Block-level",
    syntax:`&lt;<span class="ht">figure</span>&gt;...&lt;/<span class="ht">figure</span>&gt;`,
    example:`&lt;<span class="ht">figure</span>&gt;\n  &lt;<span class="ht">img</span> <span class="ha">src</span>=<span class="hv">"diagram.png"</span> <span class="ha">alt</span>=<span class="hv">"System architecture diagram"</span>&gt;\n  &lt;<span class="ht">figcaption</span>&gt;Fig. 1: System architecture overview&lt;/<span class="ht">figcaption</span>&gt;\n&lt;/<span class="ht">figure</span>&gt;\n&lt;<span class="ht">figure</span>&gt;\n  &lt;<span class="ht">pre</span>&gt;&lt;<span class="ht">code</span>&gt;const x = 42;&lt;/<span class="ht">code</span>&gt;&lt;/<span class="ht">pre</span>&gt;\n  &lt;<span class="ht">figcaption</span>&gt;Example 1: Variable declaration&lt;/<span class="ht">figcaption</span>&gt;\n&lt;/<span class="ht">figure</span>&gt;`,
    attrs:[],
    notes:`<p>The &lt;figcaption&gt; can appear as the first or last child of &lt;figure&gt;. Content in a figure is referenced from the main document flow but can be moved to an appendix without affecting the flow.</p>`,
    info:{display:"block",selfClose:"No",block:"Yes",inline:"No"}
  },
  "figcaption": {
    desc:"The figcaption element represents a caption or legend describing the rest of the contents of its parent &lt;figure&gt; element. It can appear as the first or last element inside a figure.",
    category:"Text Content", type:"Block-level",
    syntax:`&lt;<span class="ht">figcaption</span>&gt;Caption text&lt;/<span class="ht">figcaption</span>&gt;`,
    example:`&lt;<span class="ht">figure</span>&gt;\n  &lt;<span class="ht">img</span> <span class="ha">src</span>=<span class="hv">"photo.jpg"</span> <span class="ha">alt</span>=<span class="hv">"Eiffel Tower at sunset"</span>&gt;\n  &lt;<span class="ht">figcaption</span>&gt;The Eiffel Tower illuminated at sunset, Paris, France.&lt;/<span class="ht">figcaption</span>&gt;\n&lt;/<span class="ht">figure</span>&gt;`,
    attrs:[],
    notes:`<p>There can only be one &lt;figcaption&gt; inside a &lt;figure&gt;. If the figcaption text fully describes the image, you can use an empty alt attribute on the image to avoid duplicate announcements.</p>`,
    info:{display:"block",selfClose:"No",block:"Yes",inline:"No"}
  },
  "mark": {
    desc:"The mark element represents text which is marked or highlighted for reference or notation purposes, due to its relevance or importance in another context.",
    category:"Inline Text Semantics", type:"Inline",
    syntax:`&lt;<span class="ht">mark</span>&gt;highlighted text&lt;/<span class="ht">mark</span>&gt;`,
    example:`&lt;<span class="ht">p</span>&gt;Search results for "HTML": ... you can learn &lt;<span class="ht">mark</span>&gt;HTML&lt;/<span class="ht">mark</span>&gt; in just a few weeks.&lt;/<span class="ht">p</span>&gt;\n&lt;<span class="ht">p</span>&gt;Important: &lt;<span class="ht">mark</span>&gt;The exam is on Monday.&lt;/<span class="ht">mark</span>&gt;&lt;/<span class="ht">p</span>&gt;`,
    attrs:[],
    notes:`<p>Use &lt;mark&gt; for search result highlighting or annotation highlights. Don't use it for syntax highlighting — use &lt;code&gt; with CSS. It renders with a yellow background by default.</p>`,
    info:{display:"inline",selfClose:"No",block:"No",inline:"Yes"}
  },
  "time": {
    desc:"The time element represents a specific period in time. The datetime attribute provides the machine-readable format, while the element content is for human display. Used for publication dates, event times, etc.",
    category:"Inline Text Semantics", type:"Inline",
    syntax:`&lt;<span class="ht">time</span> <span class="ha">datetime</span>=<span class="hv">"YYYY-MM-DD"</span>&gt;human date&lt;/<span class="ht">time</span>&gt;`,
    example:`&lt;<span class="ht">p</span>&gt;Published on &lt;<span class="ht">time</span> <span class="ha">datetime</span>=<span class="hv">"2024-03-15"</span>&gt;March 15, 2024&lt;/<span class="ht">time</span>&gt;.&lt;/<span class="ht">p</span>&gt;\n&lt;<span class="ht">p</span>&gt;Event starts at &lt;<span class="ht">time</span> <span class="ha">datetime</span>=<span class="hv">"2024-12-31T23:59:00"</span>&gt;11:59 PM on New Year's Eve&lt;/<span class="ht">time</span>&gt;.&lt;/<span class="ht">p</span>&gt;`,
    attrs:[{n:"datetime",t:"string",d:"Machine-readable date/time in ISO 8601 format"}],
    notes:`<p>The datetime attribute supports ISO 8601 formats: dates (2024-03-15), times (14:30), datetimes (2024-03-15T14:30:00), and durations (PT2H30M for 2.5 hours).</p>`,
    info:{display:"inline",selfClose:"No",block:"No",inline:"Yes"}
  },
  "abbr": {
    desc:"The abbr element represents an abbreviation or acronym. The title attribute provides the full expansion. When hovered, the browser typically shows the expansion as a tooltip.",
    category:"Inline Text Semantics", type:"Inline",
    syntax:`&lt;<span class="ht">abbr</span> <span class="ha">title</span>=<span class="hv">"Full Expansion"</span>&gt;ABBR&lt;/<span class="ht">abbr</span>&gt;`,
    example:`&lt;<span class="ht">p</span>&gt;I love &lt;<span class="ht">abbr</span> <span class="ha">title</span>=<span class="hv">"HyperText Markup Language"</span>&gt;HTML&lt;/<span class="ht">abbr</span>&gt; and &lt;<span class="ht">abbr</span> <span class="ha">title</span>=<span class="hv">"Cascading Style Sheets"</span>&gt;CSS&lt;/<span class="ht">abbr</span>&gt;.&lt;/<span class="ht">p</span>&gt;`,
    attrs:[{n:"title",t:"string",d:"The full expansion of the abbreviation (shown as tooltip)"}],
    notes:`<p>Always define an abbreviation on first use on a page. Screen readers may or may not expand abbreviations — consider spelling them out in parentheses the first time they appear.</p>`,
    info:{display:"inline",selfClose:"No",block:"No",inline:"Yes"}
  },
  "cite": {
    desc:"The cite element is used to describe a reference to a cited creative work. It must include the title of that work. Examples: books, papers, essays, poems, scores, songs, scripts, films, paintings, etc.",
    category:"Inline Text Semantics", type:"Inline",
    syntax:`&lt;<span class="ht">cite</span>&gt;Work Title&lt;/<span class="ht">cite</span>&gt;`,
    example:`&lt;<span class="ht">p</span>&gt;My favorite book is &lt;<span class="ht">cite</span>&gt;The Great Gatsby&lt;/<span class="ht">cite</span>&gt; by F. Scott Fitzgerald.&lt;/<span class="ht">p</span>&gt;\n&lt;<span class="ht">blockquote</span>&gt;\n  &lt;<span class="ht">p</span>&gt;"To be or not to be..."&lt;/<span class="ht">p</span>&gt;\n  &lt;<span class="ht">cite</span>&gt;Hamlet, Act III, Scene I&lt;/<span class="ht">cite</span>&gt;\n&lt;/<span class="ht">blockquote</span>&gt;`,
    attrs:[],
    notes:`<p>Do not use &lt;cite&gt; for people's names — only for titles of works. It is different from the cite attribute used on &lt;blockquote&gt; and &lt;q&gt; elements.</p>`,
    info:{display:"inline",selfClose:"No",block:"No",inline:"Yes"}
  },
  "dl": {
    desc:"The dl element (description list) represents a list of term-description groups. Each term is wrapped in &lt;dt&gt; and its description in &lt;dd&gt;. Used for glossaries, metadata lists, and FAQ-style content.",
    category:"Text Content", type:"Block-level",
    syntax:`&lt;<span class="ht">dl</span>&gt;&lt;<span class="ht">dt</span>&gt;Term&lt;/<span class="ht">dt</span>&gt;&lt;<span class="ht">dd</span>&gt;Description&lt;/<span class="ht">dd</span>&gt;&lt;/<span class="ht">dl</span>&gt;`,
    example:`&lt;<span class="ht">dl</span>&gt;\n  &lt;<span class="ht">dt</span>&gt;HTML&lt;/<span class="ht">dt</span>&gt;\n  &lt;<span class="ht">dd</span>&gt;HyperText Markup Language - the standard for web pages.&lt;/<span class="ht">dd</span>&gt;\n\n  &lt;<span class="ht">dt</span>&gt;CSS&lt;/<span class="ht">dt</span>&gt;\n  &lt;<span class="ht">dd</span>&gt;Cascading Style Sheets - controls presentation.&lt;/<span class="ht">dd</span>&gt;\n\n  &lt;<span class="ht">dt</span>&gt;JS&lt;/<span class="ht">dt</span>&gt;\n  &lt;<span class="ht">dd</span>&gt;JavaScript - adds interactivity to web pages.&lt;/<span class="ht">dd</span>&gt;\n&lt;/<span class="ht">dl</span>&gt;`,
    attrs:[],
    notes:`<p>Multiple &lt;dt&gt; elements can share one &lt;dd&gt;, and one &lt;dt&gt; can have multiple &lt;dd&gt; definitions. Great for technical glossaries, API documentation, and structured metadata.</p>`,
    info:{display:"block",selfClose:"No",block:"Yes",inline:"No"}
  },
  "progress": {
    desc:"The progress element displays an indicator showing the completion progress of a task. It can be determinate (with a value) or indeterminate (without a value, showing a spinning/pulsing animation).",
    category:"Forms", type:"Inline",
    syntax:`&lt;<span class="ht">progress</span> <span class="ha">value</span>=<span class="hv">"70"</span> <span class="ha">max</span>=<span class="hv">"100"</span>&gt;&lt;/<span class="ht">progress</span>&gt;`,
    example:`<span class="hc">&lt;!-- Determinate (70% complete) --&gt;</span>\n&lt;<span class="ht">label</span>&gt;Upload Progress:\n  &lt;<span class="ht">progress</span> <span class="ha">value</span>=<span class="hv">"70"</span> <span class="ha">max</span>=<span class="hv">"100"</span>&gt;70%&lt;/<span class="ht">progress</span>&gt;\n&lt;/<span class="ht">label</span>&gt;\n<span class="hc">&lt;!-- Indeterminate --&gt;</span>\n&lt;<span class="ht">progress</span>&gt;Loading...&lt;/<span class="ht">progress</span>&gt;`,
    attrs:[
      {n:"value",t:"number",d:"Current value (omit for indeterminate state)"},
      {n:"max",t:"number",d:"Maximum value (default: 1.0)"}
    ],
    notes:`<p>Style the progress bar using vendor-prefixed pseudo-elements: <code style="color:var(--accent)">::-webkit-progress-bar</code> and <code style="color:var(--accent)">::-moz-progress-bar</code> for cross-browser styling.</p>`,
    info:{display:"inline",selfClose:"No",block:"No",inline:"Yes"}
  },
  "meter": {
    desc:"The meter element represents a scalar measurement within a known range, or a fractional value such as disk usage, query result relevance, amount of password strength. Unlike &lt;progress&gt;, it represents a gauge not a task.",
    category:"Forms", type:"Inline",
    syntax:`&lt;<span class="ht">meter</span> <span class="ha">value</span>=<span class="hv">"6"</span> <span class="ha">min</span>=<span class="hv">"0"</span> <span class="ha">max</span>=<span class="hv">"10"</span>&gt;6 out of 10&lt;/<span class="ht">meter</span>&gt;`,
    example:`<span class="hc">&lt;!-- Disk usage --&gt;</span>\n&lt;<span class="ht">meter</span> <span class="ha">value</span>=<span class="hv">"75"</span> <span class="ha">min</span>=<span class="hv">"0"</span> <span class="ha">max</span>=<span class="hv">"100"</span> <span class="ha">low</span>=<span class="hv">"25"</span> <span class="ha">high</span>=<span class="hv">"90"</span> <span class="ha">optimum</span>=<span class="hv">"50"</span>&gt;75GB used&lt;/<span class="ht">meter</span>&gt;\n<span class="hc">&lt;!-- Password strength --&gt;</span>\n&lt;<span class="ht">meter</span> <span class="ha">value</span>=<span class="hv">"0.8"</span>&gt;Strong password&lt;/<span class="ht">meter</span>&gt;`,
    attrs:[
      {n:"value",t:"number",d:"Current value (required)"},
      {n:"min",t:"number",d:"Lower bound (default: 0)"},
      {n:"max",t:"number",d:"Upper bound (default: 1)"},
      {n:"low",t:"number",d:"Upper boundary of 'low' range"},
      {n:"high",t:"number",d:"Lower boundary of 'high' range"},
      {n:"optimum",t:"number",d:"Optimal value — determines colour coding"}
    ],
    notes:`<p>The browser colours the meter based on the relationship between value and optimum/low/high thresholds — green for optimal, yellow for suboptimal, red for least optimal.</p>`,
    info:{display:"inline",selfClose:"No",block:"No",inline:"Yes"}
  },
  "fieldset": {
    desc:"The fieldset element groups related form controls together with a visual box. The &lt;legend&gt; element provides a caption for the group. It is crucial for grouping radio buttons and checkboxes.",
    category:"Forms", type:"Block-level",
    syntax:`&lt;<span class="ht">fieldset</span>&gt;&lt;<span class="ht">legend</span>&gt;Group Label&lt;/<span class="ht">legend</span>&gt;...&lt;/<span class="ht">fieldset</span>&gt;`,
    example:`&lt;<span class="ht">fieldset</span>&gt;\n  &lt;<span class="ht">legend</span>&gt;Preferred Contact Method&lt;/<span class="ht">legend</span>&gt;\n  &lt;<span class="ht">label</span>&gt;&lt;<span class="ht">input</span> <span class="ha">type</span>=<span class="hv">"radio"</span> <span class="ha">name</span>=<span class="hv">"contact"</span> <span class="ha">value</span>=<span class="hv">"email"</span>&gt; Email&lt;/<span class="ht">label</span>&gt;\n  &lt;<span class="ht">label</span>&gt;&lt;<span class="ht">input</span> <span class="ha">type</span>=<span class="hv">"radio"</span> <span class="ha">name</span>=<span class="hv">"contact"</span> <span class="ha">value</span>=<span class="hv">"phone"</span>&gt; Phone&lt;/<span class="ht">label</span>&gt;\n&lt;/<span class="ht">fieldset</span>&gt;`,
    attrs:[{n:"disabled",t:"boolean",d:"Disables all form controls within the fieldset"}],
    notes:`<p>Screen readers announce the legend when any control inside the fieldset receives focus, providing crucial context for radio button groups. Setting disabled on fieldset disables all child inputs at once.</p>`,
    info:{display:"block",selfClose:"No",block:"Yes",inline:"No"}
  },
  "table":{desc:"The table element represents tabular data — information in rows and columns. Always use semantic table elements (thead, tbody, tfoot) and add captions. Never use tables for page layout.",category:"Tables",type:"Block-level",syntax:`&lt;<span class="ht">table</span>&gt;...&lt;/<span class="ht">table</span>&gt;`,example:`&lt;<span class="ht">table</span>&gt;\n  &lt;<span class="ht">thead</span>&gt;&lt;<span class="ht">tr</span>&gt;&lt;<span class="ht">th</span>&gt;Name&lt;/<span class="ht">th</span>&gt;&lt;<span class="ht">th</span>&gt;Score&lt;/<span class="ht">th</span>&gt;&lt;/<span class="ht">tr</span>&gt;&lt;/<span class="ht">thead</span>&gt;\n  &lt;<span class="ht">tbody</span>&gt;&lt;<span class="ht">tr</span>&gt;&lt;<span class="ht">td</span>&gt;Alice&lt;/<span class="ht">td</span>&gt;&lt;<span class="ht">td</span>&gt;95&lt;/<span class="ht">td</span>&gt;&lt;/<span class="ht">tr</span>&gt;&lt;/<span class="ht">tbody</span>&gt;\n&lt;/<span class="ht">table</span>&gt;`,attrs:[],notes:`<p>Add <code style="color:var(--accent)">scope="col"</code> or <code style="color:var(--accent)">scope="row"</code> to &lt;th&gt; elements for better accessibility. Use &lt;caption&gt; to describe the table.</p>`,info:{display:"table",selfClose:"No",block:"Yes",inline:"No"}},
  "tr":{desc:"The tr element defines a table row. It contains &lt;th&gt; (header cell) or &lt;td&gt; (data cell) elements. It must be a child of &lt;thead&gt;, &lt;tbody&gt;, &lt;tfoot&gt;, or &lt;table&gt;.",category:"Tables",type:"Table Row",syntax:`&lt;<span class="ht">tr</span>&gt;&lt;<span class="ht">td</span>&gt;...&lt;/<span class="ht">td</span>&gt;&lt;/<span class="ht">tr</span>&gt;`,example:`&lt;<span class="ht">table</span>&gt;\n  &lt;<span class="ht">tr</span>&gt;&lt;<span class="ht">th</span>&gt;Col 1&lt;/<span class="ht">th</span>&gt;&lt;<span class="ht">th</span>&gt;Col 2&lt;/<span class="ht">th</span>&gt;&lt;/<span class="ht">tr</span>&gt;\n  &lt;<span class="ht">tr</span>&gt;&lt;<span class="ht">td</span>&gt;Data 1&lt;/<span class="ht">td</span>&gt;&lt;<span class="ht">td</span>&gt;Data 2&lt;/<span class="ht">td</span>&gt;&lt;/<span class="ht">tr</span>&gt;\n&lt;/<span class="ht">table</span>&gt;`,attrs:[],notes:`<p>Each &lt;tr&gt; should contain the same number of cells, accounting for any rowspan or colspan attributes on cells.</p>`,info:{display:"table-row",selfClose:"No",block:"Yes",inline:"No"}},
  "th":{desc:"The th element defines a header cell in a table. Header cells are bold and centered by default. The scope attribute specifies whether the header applies to a column (col), row (row), column group (colgroup), or row group (rowgroup).",category:"Tables",type:"Table Header Cell",syntax:`&lt;<span class="ht">th</span> <span class="ha">scope</span>=<span class="hv">"col"</span>&gt;Header&lt;/<span class="ht">th</span>&gt;`,example:`&lt;<span class="ht">thead</span>&gt;\n  &lt;<span class="ht">tr</span>&gt;\n    &lt;<span class="ht">th</span> <span class="ha">scope</span>=<span class="hv">"col"</span>&gt;Name&lt;/<span class="ht">th</span>&gt;\n    &lt;<span class="ht">th</span> <span class="ha">scope</span>=<span class="hv">"col"</span>&gt;Age&lt;/<span class="ht">th</span>&gt;\n  &lt;/<span class="ht">tr</span>&gt;\n&lt;/<span class="ht">thead</span>&gt;`,attrs:[{n:"scope",t:"col|row|colgroup|rowgroup",d:"Defines which cells the header relates to"},{n:"colspan",t:"number",d:"Spans the header across multiple columns"},{n:"rowspan",t:"number",d:"Spans the header across multiple rows"}],notes:`<p>Always use &lt;th&gt; with the scope attribute for accessibility — it allows screen readers to properly associate header cells with data cells.</p>`,info:{display:"table-cell",selfClose:"No",block:"No",inline:"No"}},
  "td":{desc:"The td element defines a standard data cell in a table. It contains the actual table data. Can span multiple rows or columns using rowspan and colspan attributes.",category:"Tables",type:"Table Data Cell",syntax:`&lt;<span class="ht">td</span>&gt;Data&lt;/<span class="ht">td</span>&gt;`,example:`&lt;<span class="ht">tr</span>&gt;\n  &lt;<span class="ht">td</span>&gt;Alice&lt;/<span class="ht">td</span>&gt;\n  &lt;<span class="ht">td</span> <span class="ha">colspan</span>=<span class="hv">"2"</span>&gt;Merged Cell&lt;/<span class="ht">td</span>&gt;\n&lt;/<span class="ht">tr</span>&gt;`,attrs:[{n:"colspan",t:"number",d:"Number of columns the cell spans"},{n:"rowspan",t:"number",d:"Number of rows the cell spans"},{n:"headers",t:"string",d:"IDs of related header cells (for complex tables)"}],notes:`<p>For complex table structures, use the headers attribute referencing &lt;th id&gt; values to explicitly associate cells with headers for screen readers.</p>`,info:{display:"table-cell",selfClose:"No",block:"No",inline:"No"}},
  "noscript":{desc:"The noscript element defines an alternate content to be displayed when the browser does not support scripting, or when scripting is disabled. It can appear in both &lt;head&gt; and &lt;body&gt;.",category:"Scripting & Templates",type:"Metadata/Flow",syntax:`&lt;<span class="ht">noscript</span>&gt;fallback content&lt;/<span class="ht">noscript</span>&gt;`,example:`&lt;<span class="ht">noscript</span>&gt;\n  &lt;<span class="ht">p</span>&gt;This website requires JavaScript to function properly. Please enable JavaScript in your browser settings.&lt;/<span class="ht">p</span>&gt;\n&lt;/<span class="ht">noscript</span>&gt;`,attrs:[],notes:`<p>Provide meaningful fallback content in &lt;noscript&gt; for users who have JavaScript disabled. This is important for accessibility and progressive enhancement.</p>`,info:{display:"inline",selfClose:"No",block:"Both",inline:"No"}},
  "output":{desc:"The output element represents the result of a calculation performed by a script, or the output of a user action. It is associated with form controls via the for attribute.",category:"Forms",type:"Inline",syntax:`&lt;<span class="ht">output</span> <span class="ha">for</span>=<span class="hv">"a b"</span> <span class="ha">name</span>=<span class="hv">"result"</span>&gt;0&lt;/<span class="ht">output</span>&gt;`,example:`&lt;<span class="ht">form</span> <span class="ha">oninput</span>=<span class="hv">"result.value=+a.value + +b.value"</span>&gt;\n  &lt;<span class="ht">input</span> <span class="ha">type</span>=<span class="hv">"number"</span> <span class="ha">id</span>=<span class="hv">"a"</span> <span class="ha">value</span>=<span class="hv">"0"</span>&gt; +\n  &lt;<span class="ht">input</span> <span class="ha">type</span>=<span class="hv">"number"</span> <span class="ha">id</span>=<span class="hv">"b"</span> <span class="ha">value</span>=<span class="hv">"0"</span>&gt; =\n  &lt;<span class="ht">output</span> <span class="ha">name</span>=<span class="hv">"result"</span> <span class="ha">for</span>=<span class="hv">"a b"</span>&gt;0&lt;/<span class="ht">output</span>&gt;\n&lt;/<span class="ht">form</span>&gt;`,attrs:[{n:"for",t:"string",d:"Space-separated list of element IDs that contributed to the output"},{n:"name",t:"string",d:"Name of the element for form submission"}],notes:`<p>The &lt;output&gt; element creates a live region — screen readers announce its content when it changes. It participates in form submission when it has a name attribute.</p>`,info:{display:"inline",selfClose:"No",block:"No",inline:"Yes"}},
  "datalist":{desc:"The datalist element contains a set of &lt;option&gt; elements that represent the permissible or suggested options available for an &lt;input&gt; element. It provides an autocomplete feature.",category:"Forms",type:"Metadata",syntax:`&lt;<span class="ht">datalist</span> <span class="ha">id</span>=<span class="hv">"suggestions"</span>&gt;...&lt;/<span class="ht">datalist</span>&gt;`,example:`&lt;<span class="ht">input</span> <span class="ha">list</span>=<span class="hv">"browsers"</span> <span class="ha">placeholder</span>=<span class="hv">"Choose a browser"</span>&gt;\n&lt;<span class="ht">datalist</span> <span class="ha">id</span>=<span class="hv">"browsers"</span>&gt;\n  &lt;<span class="ht">option</span> <span class="ha">value</span>=<span class="hv">"Chrome"</span>&gt;\n  &lt;<span class="ht">option</span> <span class="ha">value</span>=<span class="hv">"Firefox"</span>&gt;\n  &lt;<span class="ht">option</span> <span class="ha">value</span>=<span class="hv">"Safari"</span>&gt;\n  &lt;<span class="ht">option</span> <span class="ha">value</span>=<span class="hv">"Edge"</span>&gt;\n&lt;/<span class="ht">datalist</span>&gt;`,attrs:[],notes:`<p>Unlike &lt;select&gt;, &lt;datalist&gt; allows any value — the options are suggestions only. Connect it to an input using the input's list attribute matching the datalist's id.</p>`,info:{display:"none",selfClose:"No",block:"N/A",inline:"No"}},
  "wbr":{desc:"The wbr (Word Break Opportunity) element represents a position within text where the browser may optionally break a line, though its line-breaking rules would not otherwise create a break at that location.",category:"Inline Text Semantics",type:"Void Element",void:true,syntax:`&lt;<span class="ht">wbr</span>&gt;`,example:`&lt;<span class="ht">p</span>&gt;Llanfair&lt;<span class="ht">wbr</span>&gt;pwllgwyngyll&lt;<span class="ht">wbr</span>&gt;gogery&lt;<span class="ht">wbr</span>&gt;chwyrndrobwll&lt;/<span class="ht">p</span>&gt;\n<span class="hc">&lt;!-- Long URL that should break at slashes --&gt;</span>\n&lt;<span class="ht">a</span>&gt;https://very-long-domain.com&lt;<span class="ht">wbr</span>&gt;/very/long/path/here&lt;/<span class="ht">a</span>&gt;`,attrs:[],notes:`<p>&lt;wbr&gt; does not introduce a hyphen at the break point — it's invisible. Use it in long technical terms, URLs, and compound words to improve readability on narrow screens.</p>`,info:{display:"inline",selfClose:"Yes",block:"No",inline:"Yes"}},
  "map":{desc:"The map element is used with &lt;area&gt; elements to define an image map — a clickable image where different areas link to different destinations.",category:"Images & Multimedia",type:"Inline",syntax:`&lt;<span class="ht">map</span> <span class="ha">name</span>=<span class="hv">"mapName"</span>&gt;&lt;<span class="ht">area</span>&gt;&lt;/<span class="ht">map</span>&gt;`,example:`&lt;<span class="ht">img</span> <span class="ha">src</span>=<span class="hv">"planets.jpg"</span> <span class="ha">alt</span>=<span class="hv">"Planets"</span> <span class="ha">usemap</span>=<span class="hv">"#planetmap"</span>&gt;\n&lt;<span class="ht">map</span> <span class="ha">name</span>=<span class="hv">"planetmap"</span>&gt;\n  &lt;<span class="ht">area</span> <span class="ha">shape</span>=<span class="hv">"rect"</span> <span class="ha">coords</span>=<span class="hv">"0,0,82,126"</span> <span class="ha">href</span>=<span class="hv">"sun.html"</span> <span class="ha">alt</span>=<span class="hv">"Sun"</span>&gt;\n  &lt;<span class="ht">area</span> <span class="ha">shape</span>=<span class="hv">"circle"</span> <span class="ha">coords</span>=<span class="hv">"90,58,3"</span> <span class="ha">href</span>=<span class="hv">"mercury.html"</span> <span class="ha">alt</span>=<span class="hv">"Mercury"</span>&gt;\n&lt;/<span class="ht">map</span>&gt;`,attrs:[{n:"name",t:"string",d:"The name of the map (referenced by img usemap attribute)"}],notes:`<p>Image maps were popular in the 1990s for navigation. Today, CSS and JavaScript provide better alternatives. The map name must match the img's usemap value (without the # for name).</p>`,info:{display:"none",selfClose:"No",block:"N/A",inline:"No"}},
};

// Default data for unknown tags
function getTagData(tag) {
  return DB[tag] || {
    desc:`The &lt;${tag}&gt; element is a valid HTML element. It is used in specific contexts within HTML documents.`,
    category:"HTML Element", type:"Element",
    syntax:`&lt;<span class="ht">${tag}</span>&gt;...&lt;/<span class="ht">${tag}</span>&gt;`,
    example:`&lt;<span class="ht">${tag}</span>&gt;Content here&lt;/<span class="ht">${tag}</span>&gt;`,
    attrs:[],
    notes:`<p>Refer to the MDN Web Docs or W3C specification for the most up-to-date information about this element.</p>`,
    info:{display:"varies",selfClose:"No",block:"varies",inline:"varies"}
  };
}

function renderTag(tag) {
  const d = getTagData(tag);
  const isDeprecated = d.deprecated;
  const isVoid = d.void;
  let attrsHTML = '';
  if(d.attrs && d.attrs.length) {
    attrsHTML = `<div class="section">
      <div class="section-title">Attributes</div>
      <table class="attr-table">
        <thead><tr><th>Attribute</th><th>Type</th><th>Description</th></tr></thead>
        <tbody>${d.attrs.map(a=>`<tr><td><span class="attr-name">${a.n}</span></td><td><span class="attr-type">${a.t}</span></td><td class="attr-desc">${a.d}</td></tr>`).join('')}</tbody>
      </table>
    </div>`;
  }
  return `
    <div class="tag-hero">
      <div class="hero-breadcrumb">HTML Reference <span>▸ ${d.category} ▸ &lt;${tag}&gt;</span></div>
      <div class="hero-tag-name"><span class="angle">&lt;</span><span class="tname">${tag}</span><span class="angle">&gt;</span></div>
      <div class="hero-desc">${d.desc}</div>
      <div class="hero-badges">
        <span class="hbadge hb-cat">${d.category}</span>
        <span class="hbadge hb-type">${d.type}</span>
        ${isDeprecated ? '<span class="hbadge hb-dep">⚠ Deprecated</span>' : ''}
        ${isVoid ? '<span class="hbadge hb-void">Self-closing</span>' : ''}
        ${!isDeprecated ? '<span class="hbadge hb-html5">HTML5</span>' : ''}
      </div>
    </div>
    <div class="tag-content">
      <div class="section">
        <div class="section-title">Syntax</div>
        <div class="code-block">
          <div class="code-header"><span class="code-lang">HTML</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
          <pre>${d.syntax}</pre>
        </div>
      </div>
      <div class="section">
        <div class="section-title">Example</div>
        <div class="code-block">
          <div class="code-header"><span class="code-lang">HTML Example</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
          <pre>${d.example}</pre>
        </div>
      </div>
      ${attrsHTML}
      <div class="section">
        <div class="section-title">Technical Info</div>
        <div class="info-grid">
          <div class="info-card"><div class="ic-label">CSS Display</div><div class="ic-val">${d.info.display}</div></div>
          <div class="info-card"><div class="ic-label">Self Closing</div><div class="ic-val ${d.info.selfClose==='Yes'?'yes':'no'}">${d.info.selfClose}</div></div>
          <div class="info-card"><div class="ic-label">Block Element</div><div class="ic-val ${d.info.block==='Yes'?'yes':d.info.block==='No'?'no':''}">${d.info.block}</div></div>
          <div class="info-card"><div class="ic-label">Inline Element</div><div class="ic-val ${d.info.inline==='Yes'?'yes':d.info.inline==='No'?'no':''}">${d.info.inline}</div></div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">Notes & Best Practices</div>
        ${d.notes}
      </div>
    </div>
  `;
}

function copyCode(btn) {
  const pre = btn.closest('.code-block').querySelector('pre');
  const text = pre.innerText || pre.textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.style.color = 'var(--green)';
    setTimeout(() => { btn.textContent = 'Copy'; btn.style.color = ''; }, 2000);
  });
}

// Read tag from URL
const params = new URLSearchParams(window.location.search);
const tag = params.get('tag');
if(tag) {
  document.getElementById('welcome').style.display = 'none';
  const tp = document.getElementById('tag-page');
  tp.style.display = 'block';
  tp.innerHTML = renderTag(tag);
  document.title = `<${tag}> — HTML Reference`;
}
</script>
</body>
</html>
