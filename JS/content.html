<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaScript Reference</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0f1117;
      --bg2:#161b22;
      --bg3:#1c2128;
      --text:#e6edf3;
      --text-muted:#8b949e;
      --border:#30363d;
      --accent:#f0db4f;
      --accent2:#4e5cfb;
      --blue:#58a6ff;
      --green:#3fb950;
      --red:#f85149;
      --purple:#bc8cff;
      --cyan:#8be9fd;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;overflow:auto}
    body{scroll-behavior:smooth}
    .welcome{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      padding:40px;
      background:radial-gradient(ellipse at 50% 40%, rgba(240,219,79,0.06) 0%, transparent 65%);
    }
    .welcome-icon{
      font-family:'JetBrains Mono',monospace;
      font-size:72px;
      font-weight:700;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      line-height:1;
      margin-bottom:24px;
      filter:drop-shadow(0 0 30px rgba(240,219,79,0.3));
    }
    .welcome-title{font-size:28px;font-weight:700;color:var(--text);margin-bottom:10px;letter-spacing:-0.5px}
    .welcome-sub{color:var(--text-muted);font-size:14px;text-align:center;max-width:420px;margin-bottom:32px;line-height:1.7}
    .welcome-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:520px;width:100%}
    .welcome-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
    .wc-num{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--accent);display:block}
    .wc-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
    .welcome-hint{margin-top:28px;padding:12px 20px;background:rgba(240,219,79,0.07);border:1px solid rgba(240,219,79,0.2);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent)}
    .tag-page{display:none;padding:0}
    .tag-hero{
      background:linear-gradient(135deg,#0d1117 0%,#131922 100%);
      border-bottom:1px solid var(--border);
      padding:32px 40px 28px;
      position:relative;
      overflow:hidden;
    }
    .tag-hero:before{
      content:'';
      position:absolute;
      top:-60px;
      right:-60px;
      width:250px;
      height:250px;
      background:radial-gradient(circle, rgba(240,219,79,0.08) 0%, transparent 70%);
      pointer-events:none;
    }
    .hero-breadcrumb{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-muted);margin-bottom:12px;letter-spacing:0.5px}
    .hero-breadcrumb span{color:var(--accent)}
    .hero-tag-name{font-family:'JetBrains Mono',monospace;font-size:40px;font-weight:700;color:var(--text);line-height:1;margin-bottom:10px}
    .hero-tag-name .angle{color:rgba(240,219,79,0.4);font-size:32px}
    .hero-tag-name .tname{color:var(--accent)}
    .hero-desc{font-size:15px;color:var(--text-muted);max-width:760px;line-height:1.6;margin-bottom:16px}
    .hero-badges{display:flex;gap:8px;flex-wrap:wrap}
    .hbadge{
      padding:4px 11px;border-radius:20px;font-size:10px;
      font-family:'JetBrains Mono',monospace;font-weight:600;
      letter-spacing:0.8px;text-transform:uppercase;
    }
    .hb-cat{background:rgba(88,166,255,0.12);color:var(--blue);border:1px solid rgba(88,166,255,0.25)}
    .hb-type{background:rgba(63,185,80,0.12);color:var(--green);border:1px solid rgba(63,185,80,0.25)}
    .hb-es{background:rgba(78,92,251,0.12);color:var(--accent2);border:1px solid rgba(78,92,251,0.25)}
    .tag-content{padding:32px 40px 60px;max-width:1100px}
    .section{margin-bottom:36px}
    .section-title{
      font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;
      color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;
      margin-bottom:14px;display:flex;align-items:center;gap:10px
    }
    .section-title:after{content:'';flex:1;height:1px;background:var(--border)}
    .section p{color:#b0bec5;line-height:1.8;margin-bottom:10px}
    .section p:last-child{margin-bottom:0}
    .code-block{background:#0d1117;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:8px 0}
    .code-header{background:var(--bg2);padding:8px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
    .code-lang{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
    .code-copy{font-size:10px;color:var(--text-muted);cursor:pointer;padding:2px 8px;border:1px solid var(--border);border-radius:4px;background:transparent;font-family:'JetBrains Mono',monospace;transition:all .15s}
    .code-copy:hover{color:var(--accent);border-color:var(--accent)}
    pre{padding:16px 20px;overflow-x:auto;font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.7;color:#e6edf3}
    pre::-webkit-scrollbar{height:4px}
    pre::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    .attr-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:4px}
    .attr-table th{text-align:left;padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);background:var(--bg2)}
    .attr-table td{padding:9px 12px;border-bottom:1px solid rgba(48,54,61,0.5);vertical-align:top}
    .attr-table tr:last-child td{border-bottom:none}
    .attr-table tr:hover td{background:rgba(255,255,255,0.02)}
    .attr-name{font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:12px;font-weight:600;white-space:nowrap}
    .attr-type{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--cyan)}
    .attr-desc{color:var(--text-muted);font-size:13px}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .info-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px}
    .ic-label{font-size:9px;font-family:'JetBrains Mono',monospace;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
    .ic-val{font-size:14px;font-weight:600;color:var(--text)}
    .ic-val.yes{color:var(--green)}
    .ic-val.no{color:var(--red)}
    .note{padding:12px 16px;border-radius:8px;border-left:3px solid;margin:10px 0;font-size:13px;line-height:1.6}
    .note-info{background:rgba(88,166,255,0.07);border-color:var(--blue);color:#79b8e8}
    .note-warn{background:rgba(248,81,73,0.07);border-color:var(--red);color:#f0857f}
    .note-tip{background:rgba(63,185,80,0.07);border-color:var(--green);color:#6ed67e}
  </style>
</head>
<body>
  <div id="welcome" class="welcome">
    <div class="welcome-icon">{ }</div>
    <div class="welcome-title">JavaScript Reference</div>
    <div class="welcome-sub">A complete guide to JavaScript topics. Select any topic from the sidebar to explore syntax, examples, properties, and notes.</div>
    <div class="welcome-grid">
      <div class="welcome-card"><span class="wc-num">102</span><span class="wc-label">Topics</span></div>
      <div class="welcome-card"><span class="wc-num">ES2026</span><span class="wc-label">Standard</span></div>
      <div class="welcome-card"><span class="wc-num">6</span><span class="wc-label">Categories</span></div>
    </div>
    <div class="welcome-hint">Click any topic in the sidebar to begin</div>
  </div>

  <div id="tag-page" class="tag-page"></div>

    const params = new URLSearchParams(window.location.search);
    const tag = params.get('tag');
    const welcome = document.getElementById('welcome');
    const tp = document.getElementById('tag-page');

    function copyCode(btn){
      const pre = btn.closest('.code-block').querySelector('pre');
      navigator.clipboard.writeText(pre.innerText).then(() => {
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = 'Copy', 1200);
      });
    }

    function esc(s){ return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function renderTag(tag){
      const d = DB[tag];
      if(!d){
        return `<div class="welcome" style="min-height:100vh">
          <div class="welcome-icon">{ }</div>
          <div class="welcome-title">Topic not found</div>
          <div class="welcome-sub">Select a topic from the sidebar.</div>
        </div>`;
      }

      const attrsHTML = d.attrs && d.attrs.length ? `
        <div class="section">
          <div class="section-title">Properties / Keywords</div>
          <table class="attr-table">
            <thead><tr><th>Name</th><th>Type</th><th>Description</th></tr></thead>
            <tbody>
              ${d.attrs.map(a => `<tr><td><span class="attr-name">${a.n}</span></td><td><span class="attr-type">${a.t}</span></td><td class="attr-desc">${a.d}</td></tr>`).join('')}
            </tbody>
          </table>
        </div>` : '';

      return `
        <div class="tag-hero">
          <div class="hero-breadcrumb">JavaScript Reference <span>${d.category}</span> &nbsp;|&nbsp; <span>${tag}</span></div>
          <div class="hero-tag-name"><span class="angle">&lt;</span><span class="tname">${d.title}</span><span class="angle">&gt;</span></div>
          <div class="hero-desc">${d.desc}</div>
          <div class="hero-badges">
            <span class="hbadge hb-cat">${d.category}</span>
            <span class="hbadge hb-type">${d.type}</span>
            <span class="hbadge hb-es">ES2026</span>
          </div>
        </div>

        <div class="tag-content">
          <div class="section">
            <div class="section-title">Syntax</div>
            <div class="code-block">
              <div class="code-header"><span class="code-lang">JavaScript</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
              <pre>${esc(d.syntax)}</pre>
            </div>
          </div>

          <div class="section">
            <div class="section-title">Example</div>
            <div class="code-block">
              <div class="code-header"><span class="code-lang">JavaScript Example</span><button class="code-copy" onclick="copyCode(this)">Copy</button></div>
              <pre>${esc(d.example)}</pre>
            </div>
          </div>

          ${attrsHTML}

          <div class="section">
            <div class="section-title">Technical Info</div>
            <div class="info-grid">
              <div class="info-card"><div class="ic-label">Display</div><div class="ic-val">${d.info.display}</div></div>
              <div class="info-card"><div class="ic-label">Self Closing</div><div class="ic-val ${d.info.selfClose==='Yes'?'yes':'no'}">${d.info.selfClose}</div></div>
              <div class="info-card"><div class="ic-label">Block Element</div><div class="ic-val ${d.info.block==='Yes'?'yes':'no'}">${d.info.block}</div></div>
              <div class="info-card"><div class="ic-label">Inline Element</div><div class="ic-val ${d.info.inline==='Yes'?'yes':'no'}">${d.info.inline}</div></div>
            </div>
          </div>

          <div class="section">
            <div class="section-title">Notes & Best Practices</div>
            <div class="note note-tip">${d.notes}</div>
          </div>
        </div>
      `;
    }

    if(tag){
      welcome.style.display = 'none';
      tp.style.display = 'block';
      tp.innerHTML = renderTag(tag);
      document.title = tag + ' | JavaScript Reference';
    }
